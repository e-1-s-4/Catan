    startAutoSave() {
        this.stopAutoSave();
        this.autoSaveTimer = setInterval(() => {
            if (this.game && this.game.phase !== GAME_PHASE.GAME_OVER) {
                this.saveGame(true);
            }
        }, 30000);

        window.onbeforeunload = () => {
            if (this.game && this.game.phase !== GAME_PHASE.GAME_OVER) {
                this.saveGame(true);
            }
        };
    }

    stopAutoSave() {
        if (this.autoSaveTimer) {
            clearInterval(this.autoSaveTimer);
            this.autoSaveTimer = null;
        }
        window.onbeforeunload = null;
    }

    
    saveGame(isAuto = false) {
        if (!this.game) return;
        const data = {
            state: this.game.serialize(),
            setupConfig: this.setupConfig,
            gameStats: this.gameStats
        };
        if (this.storage.save(this.storage.keys.SAVE, data)) {
            if (!isAuto) this.toast.show('Game saved successfully', 'success');
        } else if (!isAuto) {
            this.toast.show('Failed to save game', 'error');
        }
    }
    
    loadGame() {
        const data = this.storage.load(this.storage.keys.SAVE);
        if (!data) {
            this.toast.show('No saved game found', 'error');
            return;
        }
        
        try {
            this.setupConfig = data.setupConfig;
            this.gameStats = data.gameStats || {
                trades: 0, steals: 0, knights: 0, roads: 0,
                settlements: 0, cities: 0, resources: 0, startTime: Date.now()
            };
            this.game = GameState.deserialize(data.state);
            
            // Re-init AI
            this.aiPlayers.clear();
            this.game.players.forEach(p => {
                if (p.isAI) {
                    this.aiPlayers.set(p.index, new AIPlayer(this.setupConfig.difficulty));
                }
            });
            
            // Re-init renderer
            const svgEl = document.getElementById('board-svg');
            this.renderer = new BoardRenderer(svgEl, this.grid);
            this.renderer.renderBoard(this.game.board);
            
            // Rebuild visual state
            this.game.players.forEach(p => {
                p.built.settlements.forEach(vId => this.renderer.placeBuilding('settlement', vId, p.index, false));
                p.built.cities.forEach(vId => this.renderer.placeBuilding('city', vId, p.index, false));
                p.built.roads.forEach(eId => this.renderer.placeRoad(eId, p.index, false));
            });
            this.renderer.moveRobber(this.game.board.robberPosition, false);
            
            this.showScreen('game');
            this.updateUI();
            this.addLog('Game loaded', 'important');
            this.startAutoSave();
            this.toast.show('Game loaded', 'success');
            
            // Resume AI turn if necessary
            if (this.game.currentPlayer.isAI && this.game.phase !== GAME_PHASE.SETUP) {
                this.executeAITurn(this.game.currentPlayer);
            }
            
        } catch (e) {
            console.error('Load failed:', e);
            this.toast.show('Failed to load save data', 'error');
        }
    }
    
    quitGame() {
        this.modals.confirm(
            'Quit Game',
            'Quit to the main menu? Your game will be auto-saved.',
            () => {
                if (this.game && this.game.phase !== GAME_PHASE.GAME_OVER) {
                    this.saveGame(true); // Auto-save before quitting
                }
                this.stopAutoSave();
                this.game = null;
                this.aiPlayers.clear();
                this.showScreen('menu');
                this.checkContinue();
            }
        );
    }
    
    showInGameMenu() {
        const content = Utils.createElement('div', {
            style: { display: 'flex', flexDirection: 'column', gap: '0.75rem' }
        });
        
        const resumeBtn = Utils.createElement('button', { class: 'menu-btn primary', text: '▶ Resume Game' });
        resumeBtn.onclick = () => this.modals.close();
        content.appendChild(resumeBtn);
        
        const saveBtn = Utils.createElement('button', { class: 'menu-btn', text: '💾 Save Game' });
        saveBtn.onclick = () => { this.saveGame(); this.modals.close(); };
        content.appendChild(saveBtn);
        
        const settingsBtn = Utils.createElement('button', { class: 'menu-btn', text: '⚙ Settings' });
        settingsBtn.onclick = () => { this.settingsUI.show(); };
        content.appendChild(settingsBtn);
        
        const quitBtn = Utils.createElement('button', { class: 'menu-btn', text: '✕ Quit to Menu' });
        quitBtn.onclick = () => { this.modals.close(); this.quitGame(); };
        content.appendChild(quitBtn);
        
        this.modals.open('⚓ Game Menu', content, []);
    }
    
    async handleVictory(winnerIndex) {
        const winner = this.game.players[winnerIndex];
        this.game.phase = GAME_PHASE.GAME_OVER;
        this.game.winner = winnerIndex;
        this.addLog(`🏆 ${winner.name} WINS THE GAME! 🏆`, 'important');
        this.stopAutoSave();
        
        // Calculate stats
        const playTime = Date.now() - this.gameStats.startTime;
        const isHuman = !winner.isAI;
        
        // Reveal all VP cards for all players at end of game
        this.game.players.forEach(p => {
            const vpCards = p.devCards.filter(c => c.type === 'victoryPoint' && !c.played);
            vpCards.forEach(c => {
                this.addLog(`${p.name} revealed VP card: ${c.name}`, 'important');
            });
        });
        
        const hasSettlementVP = winner.built.settlements.length > 0;
        const hasCityVP = winner.built.cities.length > 0;
        const hasLongestRoad = winner.hasLongestRoad;
        const hasLargestArmy = winner.hasLargestArmy;
        const hasHiddenVP = winner.hiddenVP > 0;
        const perfectVP = hasSettlementVP && hasCityVP && hasLongestRoad && hasLargestArmy && hasHiddenVP;
        
        const wasLast = this.game.players.every(p => p.index === winnerIndex || p.totalVP >= winner.totalVP - 2);
        
        const gameData = {
            turns: this.game.turnNumber,
            vp: winner.totalVP,
            resources: this.gameStats.resources,
            trades: this.gameStats.trades,
            steals: this.gameStats.steals,
            knights: this.gameStats.knights,
            roads: this.gameStats.roads,
            settlements: this.gameStats.settlements,
            cities: this.gameStats.cities,
            longestRoad: winner.hasLongestRoad,
            largestArmy: winner.hasLargestArmy,
            playTime,
            perfectVP,
            comeback: wasLast,
            difficulty: this.setupConfig.difficulty
        };
        
        const unlocked = this.statsManager.recordGameEnd(winnerIndex, isHuman, gameData);
        
        // Show Victory Modal
        const content = Utils.createElement('div', { class: 'victory-content' });
        content.appendChild(Utils.createElement('div', { class: 'victory-crown', text: '👑' }));
        content.appendChild(Utils.createElement('div', { class: 'victory-title', text: 'VICTORY!' }));
        content.appendChild(Utils.createElement('div', { class: 'victory-winner', text: `${winner.name} has conquered Catan!` }));
        
        const stats = Utils.createElement('div', { class: 'victory-stats' });
        stats.appendChild(this.createVictoryStat('Turns', this.game.turnNumber));
        stats.appendChild(this.createVictoryStat('VP', winner.totalVP));
        stats.appendChild(this.createVictoryStat('Time', Utils.formatTime(Math.floor(playTime / 1000))));
        content.appendChild(stats);
        
        // Final scoreboard
        const scoreBoard = Utils.createElement('div', {
            style: { marginTop: '1rem', textAlign: 'left' }
        });
        scoreBoard.appendChild(Utils.createElement('div', {
            style: { fontFamily: 'var(--font-display)', color: 'var(--color-gold)', marginBottom: '0.5rem', fontSize: '0.9rem' },
            text: 'Final Scores'
        }));
        
        const sortedPlayers = [...this.game.players].sort((a, b) => b.totalVP - a.totalVP);
        sortedPlayers.forEach((p, rank) => {
            const row = Utils.createElement('div', {
                style: { display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.25rem', fontSize: '0.85rem' }
            });
            row.appendChild(Utils.createElement('span', { text: `${rank === 0 ? '🥇' : rank === 1 ? '🥈' : rank === 2 ? '🥉' : '  '}` }));
            const dot = Utils.createElement('span', { style: { color: CONFIG.PLAYER_COLORS[p.index] }, text: '●' });
            row.appendChild(dot);
            row.appendChild(Utils.createElement('span', { style: { flex: '1' }, text: p.name }));
            const vpParts = [];
            if (p.built.settlements.length) vpParts.push(`${p.built.settlements.length}🏠`);
            if (p.built.cities.length) vpParts.push(`${p.built.cities.length}🏰`);
            if (p.hasLongestRoad) vpParts.push('🛤');
            if (p.hasLargestArmy) vpParts.push('⚔');
            if (p.hiddenVP) vpParts.push(`${p.hiddenVP}🃏`);
            row.appendChild(Utils.createElement('span', { style: { color: 'var(--color-text-dim)', fontSize: '0.75rem' }, text: vpParts.join(' ') }));
            row.appendChild(Utils.createElement('span', { style: { fontWeight: '700', color: 'var(--color-gold-light)' }, text: `${p.totalVP} VP` }));
            scoreBoard.appendChild(row);
        });
        content.appendChild(scoreBoard);
        
        if (unlocked.length > 0) {
            const achDiv = Utils.createElement('div', {
                style: { marginTop: '1rem', padding: '0.75rem', background: 'var(--color-surface)', borderRadius: '6px' }
            });
            achDiv.appendChild(Utils.createElement('div', {
                style: { fontFamily: 'var(--font-display)', color: 'var(--color-gold-light)', marginBottom: '0.5rem' },
                text: '🏅 Achievements Unlocked!'
            }));
            unlocked.forEach(id => {
                const ach = ACHIEVEMENTS.find(a => a.id === id);
                if (ach) {
                    achDiv.appendChild(Utils.createElement('div', {
                        style: { fontSize: '0.9rem', color: 'var(--color-text)' },
                        text: `${ach.icon} ${ach.name}`
                    }));
                }
            });
            content.appendChild(achDiv);
        }
        
        this.modals.open('🏆 Game Over', content, [
            { text: 'Main Menu', onClick: () => { this.storage.remove(this.storage.keys.SAVE); this.game = null; this.showScreen('menu'); this.checkContinue(); } },
            { text: 'Play Again', class: 'primary', onClick: () => { this.showScreen('setup'); this.renderSetupPlayers(); } }
        ]);
    }
    
    createVictoryStat(label, value) {
        const stat = Utils.createElement('div', { class: 'victory-stat' });
        stat.appendChild(Utils.createElement('div', { class: 'victory-stat-label', text: label }));
        stat.appendChild(Utils.createElement('div', { class: 'victory-stat-value', text: value.toString() }));
        return stat;
    }
}

// ============================================================
// SECTION 20: BOOTSTRAP
// ============================================================

window.addEventListener('DOMContentLoaded', () => {
    // Hide loading screen if present
    const loader = document.querySelector('.loading-overlay');
    if (loader) loader.style.display = 'none';
    
    // Initialize App
    window.app = new GameApp();
    
    // Global error handler
    window.addEventListener('error', (e) => {
        console.error('Global error:', e.error);
        if (window.app && window.app.toast) {
            window.app.toast.show('An unexpected error occurred', 'error');
        }
    });
});
</script>
