            this.modals.confirm(
                'Reset Statistics',
                'This will permanently erase all your stats and achievements. Continue?',
                () => {
                    window.gameApp.statsManager.reset();
                    window.gameApp.toast.show('Statistics reset', 'success');
                }
            );
        });
        dangerGroup.appendChild(resetBtn);
        content.appendChild(dangerGroup);
        
        this.modals.open('⚙ Settings', content, [
            { text: 'Close', class: 'primary' }
        ]);
    }
    
    createGroup(title) {
        const group = Utils.createElement('div', { class: 'settings-group' });
        group.appendChild(Utils.createElement('div', {
            class: 'setup-label',
            text: title
        }));
        return group;
    }
    
    createToggle(label, key, onChange = null) {
        const row = Utils.createElement('div', { class: 'settings-row' });
        row.appendChild(Utils.createElement('div', { class: 'settings-label', text: label }));
        
        const toggle = Utils.createElement('div', {
            class: `toggle ${this.settings.get(key) ? 'active' : ''}`
        });
        
        toggle.addEventListener('click', () => {
            const newValue = !this.settings.get(key);
            this.settings.set(key, newValue);
            toggle.classList.toggle('active', newValue);
            if (onChange) onChange(newValue);
        });
        
        row.appendChild(toggle);
        return row;
    }
    
    createSlider(label, key, min, max, step, onChange = null) {
        const row = Utils.createElement('div', { class: 'settings-row' });
        row.appendChild(Utils.createElement('div', { class: 'settings-label', text: label }));
        
        const container = Utils.createElement('div', { class: 'slider-container' });
        const slider = Utils.createElement('input', {
            type: 'range',
            class: 'slider',
            min: String(min),
            max: String(max),
            step: String(step),
            value: String(this.settings.get(key))
        });
        const valueDisplay = Utils.createElement('span', {
            class: 'slider-value',
            text: this.settings.get(key).toString()
        });
        
        slider.addEventListener('input', () => {
            const val = parseFloat(slider.value);
            this.settings.set(key, val);
            valueDisplay.textContent = val.toString();
            if (onChange) onChange(val);
        });
        
        container.appendChild(slider);
        container.appendChild(valueDisplay);
        row.appendChild(container);
        return row;
    }
}

class GameApp {
    constructor() {
        // Managers
        this.storage = new StorageManager();
        this.audio = new AudioManager();
        this.settings = new SettingsManager(this.storage);
        this.statsManager = new StatsManager(this.storage);
        
        // Apply initial settings
        this.audio.setEnabled(this.settings.get('soundEnabled'));
        this.audio.setVolume(this.settings.get('volume'));
        
        // UI systems
        this.toast = new ToastSystem(document.getElementById('toastContainer'));
        this.modals = new ModalManager(this.audio);
        this.tutorial = new TutorialSystem(this.modals);
        this.settingsUI = new SettingsUI(this.modals, this.settings, this.audio);
        this.statsUI = new StatsUI(document.getElementById('stats-screen'), this.statsManager);
        
        // Game state
        this.game = null;
        this.grid = new HexGrid();
        this.boardGenerator = new BoardGenerator(this.grid);
        this.renderer = null;
        this.aiPlayers = new Map();
        
        // Setup config
        this.setupConfig = {
            playerCount: 3,
            players: [
                { name: 'You', isAI: false },
                { name: 'Alaric', isAI: true },
                { name: 'Brynn', isAI: true },
                { name: 'Caius', isAI: true }
            ],
            difficulty: 'normal',
            vpTarget: 10,
            layout: 'random'
        };
        
        // UI state
        this.selectedAction = null;
        this.currentModal = null;
        this.autoSaveTimer = null;
        this.diceHistory = []; // Track recent rolls
        
        // Initialize
        this.initScreens();
        this.initMenu();
        this.initSetup();
        this.initGameUI();
        this.initKeyboard();
        this.checkContinue();
        this.createMenuParticles();
        
        // Make accessible globally for stats reset
        window.gameApp = this;
    }
    
    // --------------------------------------------------------
    // INITIALIZATION
    // --------------------------------------------------------
    
    initScreens() {
        this.screens = {
            menu: document.getElementById('menu-screen'),
            setup: document.getElementById('setup-screen'),
            game: document.getElementById('game-screen'),
            stats: document.getElementById('stats-screen')
        };
    }
    
    showScreen(name) {
        Object.values(this.screens).forEach(s => s.classList.remove('active'));
        this.screens[name].classList.add('active');
    }
    
    initMenu() {
        // Menu button handlers
        document.querySelectorAll('[data-action]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                this.audio.init();
                this.audio.resume();
                this.audio.click();
                const action = btn.dataset.action;
                this.handleMenuAction(action);
            });
        });
    }
    
    handleMenuAction(action) {
        switch (action) {
            case 'new-game':
                this.showScreen('setup');
                this.renderSetupPlayers();
                break;
            case 'continue-game':
                this.loadGame();
                break;
            case 'stats':
                this.statsUI.render();
                this.showScreen('stats');
                break;
            case 'tutorial':
                this.tutorial.show();
                break;
            case 'settings':
                this.settingsUI.show();
                break;
            case 'back-to-menu':
                this.showScreen('menu');
                break;
            case 'start-game':
                this.startGame();
                break;
            case 'quit':
                this.quitGame();
                break;
            case 'help':
                this.tutorial.show();
                break;
            case 'save':
                this.saveGame();
                break;
            case 'open-menu':
                this.showInGameMenu();
                break;
            case 'roll':
                this.handleRoll();
                break;
            case 'end-turn':
                this.handleEndTurn();
                break;
            case 'zoom-in':
                this.renderer.zoomIn();
                break;
            case 'zoom-out':
                this.renderer.zoomOut();
                break;
            case 'zoom-reset':
                this.renderer.resetView();
                break;
            case 'toggle-sound':
                {
                    const en = this.settings.toggle('soundEnabled');
                    this.audio.updateFromSettings(this.settings);
                    const btn = document.getElementById('soundBtn');
                    if (btn) btn.textContent = en ? '🔊' : '🔇';
                    this.toast.show(`Sound ${en ? 'enabled' : 'muted'}`, 'info', 1500);
                }
                break;
            case 'close-modal':
                this.modals.close();
                break;
        }
    }
    
    createMenuParticles() {
        const container = document.getElementById('menuParticles');
        for (let i = 0; i < 30; i++) {
            const p = Utils.createElement('div', {
                class: 'particle',
                style: {
                    left: `${Math.random() * 100}%`,
                    animationDelay: `${Math.random() * 12}s`,
                    animationDuration: `${8 + Math.random() * 8}s`
                }
            });
            container.appendChild(p);
        }
    }
    
    checkContinue() {
        const btn = document.getElementById('continueBtn');
        if (this.storage.has(this.storage.keys.SAVE)) {
            btn.disabled = false;
        }
    }
    
    // --------------------------------------------------------
    // SETUP SCREEN
    // --------------------------------------------------------
    
    initSetup() {
        // Player count
        document.getElementById('playerCountGrid').addEventListener('click', (e) => {
            const btn = e.target.closest('.count-btn');
            if (!btn) return;
            document.querySelectorAll('#playerCountGrid .count-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.setupConfig.playerCount = parseInt(btn.dataset.count);
            this.renderSetupPlayers();
        });
        
        // Difficulty
        document.getElementById('difficultyGrid').addEventListener('click', (e) => {
            const btn = e.target.closest('.option-btn');
            if (!btn) return;
            document.querySelectorAll('#difficultyGrid .option-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.setupConfig.difficulty = btn.dataset.diff;
        });
        
        // VP
        document.getElementById('vpGrid').addEventListener('click', (e) => {
            const btn = e.target.closest('.option-btn');
            if (!btn) return;
            document.querySelectorAll('#vpGrid .option-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.setupConfig.vpTarget = parseInt(btn.dataset.vp);
        });
        
        // Layout
        document.getElementById('layoutGrid').addEventListener('click', (e) => {
            const btn = e.target.closest('.option-btn');
            if (!btn) return;
            document.querySelectorAll('#layoutGrid .option-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.setupConfig.layout = btn.dataset.layout;
        });
    }
    
    renderSetupPlayers() {
        const container = document.getElementById('playerConfig');
        container.innerHTML = '';
        
        for (let i = 0; i < this.setupConfig.playerCount; i++) {
            const row = Utils.createElement('div', { class: 'player-row' });
            
            const dot = Utils.createElement('div', {
                class: 'player-color-dot',
                style: { background: CONFIG.PLAYER_COLORS[i] }
            });
            row.appendChild(dot);
            
            const input = Utils.createElement('input', {
                class: 'player-name-input',
                type: 'text',
                value: this.setupConfig.players[i].name,
                maxlength: '20'
            });
            input.addEventListener('input', () => {
                this.setupConfig.players[i].name = input.value;
            });
            row.appendChild(input);
            
            const select = Utils.createElement('select', { class: 'player-type-select' });
            const humanOpt = Utils.createElement('option', { value: 'false', text: '👤 Human' });
            const aiOpt = Utils.createElement('option', { value: 'true', text: '🤖 AI' });
            select.appendChild(humanOpt);
            select.appendChild(aiOpt);
            select.value = this.setupConfig.players[i].isAI.toString();
            select.addEventListener('change', () => {
                this.setupConfig.players[i].isAI = select.value === 'true';
            });
            row.appendChild(select);
            
            container.appendChild(row);
        }
    }
    
    // --------------------------------------------------------
    // GAME INITIALIZATION
    // --------------------------------------------------------
    
    startGame() {
        // Validate: at least one human
        const hasHuman = this.setupConfig.players.slice(0, this.setupConfig.playerCount)
            .some(p => !p.isAI);
        if (!hasHuman) {
            this.toast.show('At least one human player is required', 'error');
            return;
        }
        
        // Create game
        this.game = new GameState({
            playerCount: this.setupConfig.playerCount,
            difficulty: this.setupConfig.difficulty,
            vpTarget: this.setupConfig.vpTarget,
            layout: this.setupConfig.layout
        });
        
        // Generate board
        const boardData = this.boardGenerator.generate(this.setupConfig.layout);
        this.game.initBoard(boardData);
        
        // Create players
        for (let i = 0; i < this.setupConfig.playerCount; i++) {
            const cfg = this.setupConfig.players[i];
            const player = new Player(i, cfg.name || CONFIG.PLAYER_NAMES[i], cfg.isAI);
            this.game.addPlayer(player);
            
            if (cfg.isAI) {
                this.aiPlayers.set(i, new AIPlayer(this.setupConfig.difficulty));
            }
        }
        
        // Initialize renderer
        const svgEl = document.getElementById('board-svg');
        this.renderer = new BoardRenderer(svgEl, this.grid);
        this.renderer.renderBoard(this.game.board);
        
        // Track stats
        this.statsManager.recordGameStart();
        this.gameStats = {
            trades: 0,
            steals: 0,
            knights: 0,
            roads: 0,
            settlements: 0,
            cities: 0,
            resources: 0,
            startTime: Date.now()
        };
        
        // Switch to game screen
        this.showScreen('game');
        this.initGameUI();
        this.updateUI();
        this.addLog(`Game started! First to ${this.game.vpTarget} VP wins.`, 'important');
        this.startAutoSave();
        
        // Start setup phase
        this.startSetupPhase();
    }
    
    initGameUI() {
        // Sidebar tabs — only register once
        if (!this._gameUIInited) {
            this._gameUIInited = true;
            document.querySelectorAll('.sidebar-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
                });
            });
        }
    }
    
    initKeyboard() {
        document.addEventListener('keydown', (e) => {
            if (this.modals.isOpen()) return;
            if (this.isTypingTarget(e.target)) return;
            
            const key = e.key.toLowerCase();
            const ctrlOrMeta = e.ctrlKey || e.metaKey;

            if (ctrlOrMeta && key === 's') {
                e.preventDefault();
                this.saveGame(false);
                return;
            }

            switch (key) {
                case 'r':
                    if (this.game && this.canRoll()) this.handleRoll();
                    break;
                case 'e':
                    if (this.game && this.canEndTurn()) this.handleEndTurn();
                    break;
                case '1':
                    if (this.game && this.game.phase === GAME_PHASE.MAIN) this.showBuildOptions();
                    break;
                case '2':
                    if (this.game && this.game.phase === GAME_PHASE.MAIN) this.showTradeModal();
                    break;
                case '3':
                    if (this.game && this.game.phase === GAME_PHASE.MAIN) this.showPlayDevCardModal();
                    break;
                case '4':
                    if (this.game && this.game.phase === GAME_PHASE.MAIN) this.buyDevCard(this.game.currentPlayer);
                    break;
                case 'm':
                    this.settings.toggle('soundEnabled');
                    this.audio.updateFromSettings(this.settings);
                    this.toast.show(`Sound ${this.settings.get('soundEnabled') ? 'enabled' : 'muted'}`, 'info', 1800);
                    break;
                case 'escape':
                    this.cancelAction();
                    break;
            }
        });
    }

    isTypingTarget(target) {
        if (!target || !(target instanceof HTMLElement)) return false;
        if (target.isContentEditable) return true;
        const tag = target.tagName;
        return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
    }
    
    // --------------------------------------------------------
    // SETUP PHASE
    // --------------------------------------------------------
    
    async startSetupPhase() {
        this.addLog('Setup phase: place settlements and roads', 'important');
        await this.processCurrentPlayerSetup();
    }
    
    async processCurrentPlayerSetup() {
        const player = this.game.currentPlayer;
        this.updateUI();
        this.updateTurnIndicator();
        
        if (player.isAI) {
            this.setStatus(`${player.name} (AI) is placing...`);
            await Utils.wait(600);
            await this.aiSetupPlacement(player);
        } else {
            const roundStr = this.game.setupRound === 1 ? 'first' : 'second';
            this.setStatus(`${player.name}: Place your ${roundStr} settlement`);
            this.showTurnTransition(player);
            // Small delay for transition to show
            await Utils.wait(200);
            this.startInteractiveSetup(player);
        }
    }
    
    startInteractiveSetup(player) {
        const isFirstRound = this.game.setupRound === 1;
        const validVertices = this.game.getValidSettlementVertices(player.index, true);
        
        this.renderer.showValidVertices(validVertices, CONFIG.PLAYER_COLORS[player.index], async (vertexId) => {
            this.renderer.clearVertexMarkers();
            await this.completeSetupPlacement(player, vertexId);
        });
    }
    
    async completeSetupPlacement(player, vertexId) {
        // Place settlement
        this.game.buildSettlement(player.index, vertexId);
        this.renderer.placeBuilding('settlement', vertexId, player.index);
        this.audio.build();
        this.gameStats.settlements++;
        this.addLog(`${player.name} built a settlement`);
        
        // Collect resources on second settlement
        if (this.game.setupRound === 2) {
            const vertex = this.game.board.vertices.find(v => v.id === vertexId);
            const resources = {};
            vertex.hexes.forEach(hexIdx => {
                const hex = this.game.board.hexes[hexIdx];
                const res = this.game.terrainToResource(hex.terrain);
                if (res) resources[res] = (resources[res] || 0) + 1;
            });
            if (Object.keys(resources).length > 0) {
                player.addResources(resources);
                this.gameStats.resources += Object.values(resources).reduce((a, b) => a + b, 0);
                this.addLog(`${player.name} received starting resources`, 'success');
                this.showFloatingResources(vertexId, resources);
            }
        }
        
        await Utils.wait(300);
        
        // Now place road
        this.setStatus(`${player.name}: Place a road adjacent to your settlement`);
        const edges = this.game.getEdgesForVertex(vertexId);
        const validEdges = edges.filter(e => this.game.isValidRoadEdge(e.id, player.index, true));
        
        this.renderer.showValidEdges(validEdges.map(e => e.id), CONFIG.PLAYER_COLORS[player.index], async (edgeId) => {
            this.renderer.clearEdgeMarkers();
            this.game.buildRoad(player.index, edgeId);
            this.renderer.placeRoad(edgeId, player.index);
            this.audio.build();
            this.gameStats.roads++;
            this.addLog(`${player.name} built a road`);
            
            await Utils.wait(300);
            this.advanceSetup();
        });
    }
    
    async aiSetupPlacement(player) {
        const ai = this.aiPlayers.get(player.index);
        const isFirstRound = this.game.setupRound === 1;
        const placement = ai.chooseInitialPlacement(this.game, player, isFirstRound);
        
        if (!placement) {
            this.addLog(`${player.name} couldn't find a valid placement`, 'warning');
            this.advanceSetup();
            return;
        }
        
        // Place settlement
        this.game.buildSettlement(player.index, placement.vertexId);
        this.renderer.placeBuilding('settlement', placement.vertexId, player.index);
        this.audio.build();
        this.gameStats.settlements++;
        this.addLog(`${player.name} built a settlement`);
        
        await Utils.wait(400);
        
        // Collect resources on second settlement
        if (this.game.setupRound === 2) {
            const vertex = this.game.board.vertices.find(v => v.id === placement.vertexId);
            const resources = {};
            vertex.hexes.forEach(hexIdx => {
                const hex = this.game.board.hexes[hexIdx];
                const res = this.game.terrainToResource(hex.terrain);
                if (res) resources[res] = (resources[res] || 0) + 1;
            });
            if (Object.keys(resources).length > 0) {
                player.addResources(resources);
                this.gameStats.resources += Object.values(resources).reduce((a, b) => a + b, 0);
            }
        }
        
        // Place road
        if (placement.edgeId) {
            this.game.buildRoad(player.index, placement.edgeId);
            this.renderer.placeRoad(placement.edgeId, player.index);
            this.audio.build();
            this.gameStats.roads++;
            this.addLog(`${player.name} built a road`);
        }
        
        await Utils.wait(400);
        this.advanceSetup();
    }
    
    advanceSetup() {
        const setupDone = this.game.nextPlayer();
        if (setupDone) {
            this.addLog('Setup complete! Game begins!', 'important');
            this.game.phase = GAME_PHASE.ROLL;
            const firstPlayer = this.game.currentPlayer;
            if (firstPlayer.isAI) {
                // AI is first to play - need to trigger their turn
                Utils.wait(600).then(() => this.rollDice());
            } else {
                this.showTurnTransition(firstPlayer);
            }
        } else {
            this.processCurrentPlayerSetup();
        }
    }
    
    // --------------------------------------------------------
    // TURN PROCESSING
    // --------------------------------------------------------
    
    async handleRoll() {
        if (!this.canRoll()) return;
        
        const player = this.game.currentPlayer;
        if (player.isAI) return; // AI rolls itself
        
        this.audio.diceRoll();
        await this.rollDice();
    }
    
    async rollDice() {
        const player = this.game.currentPlayer;
        
        // Show roll animation
        const overlay = document.getElementById('diceRollOverlay');
        const bigDice = document.getElementById('diceRollBig');
        bigDice.innerHTML = '';
        
        // Random roll
        const d1 = Utils.randInt(1, 6);
        const d2 = Utils.randInt(1, 6);
        const total = d1 + d2;
        
        const die1El = Utils.createElement('div', { class: 'dice-big', text: '...' });
        const die2El = Utils.createElement('div', { class: 'dice-big', text: '...' });
        bigDice.appendChild(die1El);
        bigDice.appendChild(die2El);
        
        overlay.classList.add('active');
        
        // Animate
        await Utils.wait(400);
        die1El.textContent = d1;
        await Utils.wait(200);
        die2El.textContent = d2;
        
        if (total === 7) {
            die1El.classList.add('red');
            die2El.classList.add('red');
        }
        
        this.audio.diceLand();
        
        await Utils.wait(1200);
        overlay.classList.remove('active');
        
        // Update small dice
        document.getElementById('dice1').textContent = d1;
        document.getElementById('dice2').textContent = d2;
        const diceSum = Utils.createElement('div', {
            style: {
                fontSize: '0.7rem',
                color: total === 7 ? 'var(--color-danger)' : 'var(--color-gold)',
                fontWeight: '700',
                textAlign: 'center',
                minWidth: '20px'
            },
            text: `=${total}`
        });
        // Update or replace the sum display
        const existingSum = document.getElementById('diceSum');
        if (existingSum) existingSum.remove();
        diceSum.id = 'diceSum';
        document.getElementById('diceDisplay').appendChild(diceSum);
        
        if (total === 7) {
            document.getElementById('dice1').classList.add('red');
            document.getElementById('dice2').classList.add('red');
        } else {
            document.getElementById('dice1').classList.remove('red');
            document.getElementById('dice2').classList.remove('red');
        }
        
        this.game.lastRoll = total;
        this.game.hasRolledThisTurn = true;
        this.game.lastRolledSeven = (total === 7);
        
        // Track dice history
        this.diceHistory.unshift({ d1, d2, total });
        if (this.diceHistory.length > 8) this.diceHistory.pop();
        this.updateDiceHistory();
        
        this.addLog(`${player.name} rolled ${d1} + ${d2} = ${total}`, total === 7 ? 'warning' : 'important');
        
        // Process roll
        await this.processRoll(total, player);
    }
    
    async processRoll(total, player) {
        if (total === 7) {
            await this.handleRollSeven(player);
        } else {
            // Distribute resources
            const produced = this.game.distributeResources(total);
            
            // Flash hexes and show floating resources
            const flashedHexes = new Set();
            for (const prod of produced) {
                if (!flashedHexes.has(prod.hexIndex)) {
                    this.renderer.flashHex(prod.hexIndex);
                    flashedHexes.add(prod.hexIndex);
                }
                
                const hexPos = this.renderer.getHexScreenPosition(prod.hexIndex);
                if (hexPos) {
                    FloatingResource.show(
                        hexPos.x - 20,
                        hexPos.y - 20,
                        CONFIG.RESOURCE_EMOJI[prod.resource],
                        prod.count
                    );
                }
                
                this.gameStats.resources += prod.count;
            }
            
            if (produced.length > 0) {
                this.audio.resourceGain();
                // Group by player for log
                const byPlayer = {};
                produced.forEach(p => {
                    if (!byPlayer[p.playerIndex]) byPlayer[p.playerIndex] = {};
                    byPlayer[p.playerIndex][p.resource] = (byPlayer[p.playerIndex][p.resource] || 0) + p.count;
                });
                Object.entries(byPlayer).forEach(([pIdx, resources]) => {
                    const p = this.game.players[pIdx];
                    const resStr = Object.entries(resources).map(([r, c]) => 
                        `${CONFIG.RESOURCE_EMOJI[r]}${c > 1 ? '×' + c : ''}`
                    ).join(' ');
                    this.addLog(`${p.name} received ${resStr}`, 'success');
                });
            } else {
                this.addLog('No resources produced');
            }
            
            await Utils.wait(600);
            this.game.phase = GAME_PHASE.MAIN;
            this.updateUI();
            
            // If AI's turn, continue
            if (player.isAI) {
                await this.executeAITurn(player);
            }
        }
    }
    
    async handleRollSeven(player) {
        this.audio.robber();
        
        // Step 1: Discard phase
        const discarders = this.game.players.filter(p => p.totalResources > 7);
        
        for (const p of discarders) {
            const discardCount = p.getDiscardCount();
            if (p.isAI) {
                const ai = this.aiPlayers.get(p.index);
                const toDiscard = ai.chooseDiscard(p, discardCount);
                p.removeResources(toDiscard);
                this.addLog(`${p.name} discarded ${discardCount} cards`, 'warning');
            } else {
                await this.promptDiscard(p, discardCount);
            }
        }
        
        // Step 2: Move robber
        if (player.isAI) {
            const ai = this.aiPlayers.get(player.index);
            const hexIndex = ai.chooseRobberPlacement(this.game, player);
            await this.moveRobber(player, hexIndex);
            
            // Step 3: Steal
            const targets = this.game.getStealTargets(hexIndex, player.index);
            if (targets.length > 0) {
                const targetIdx = ai.chooseStealTarget(this.game, player, targets);
                if (targetIdx !== null) {
                    const stolen = this.game.stealFrom(player.index, targetIdx);
                    if (stolen) {
                        this.addLog(`${player.name} stole ${CONFIG.RESOURCE_EMOJI[stolen]} from ${this.game.players[targetIdx].name}`, 'warning');
                        this.gameStats.steals++;
                    }
                }
            }
            
            this.game.phase = GAME_PHASE.MAIN;
            await this.executeAITurn(player);
        } else {
            // Human player moves robber
            this.setStatus('Move the robber to any hex');
            this.game.phase = GAME_PHASE.ROBBER_MOVE;
            this.showRobberPlacementOptions(player);
        }
    }
    
    showRobberPlacementOptions(player) {
        const validHexes = this.game.board.hexes
            .filter(h => h.index !== this.game.board.robberPosition)
            .map(h => h.index);
        
        validHexes.forEach(h => this.renderer.highlightHex(h, true));
        this.setStatus('🦹 Click a hex to place the robber');
        
        // Click handler on hexes
        this.renderer.hexLayer.querySelectorAll('.hex-tile').forEach(el => {
            const idx = parseInt(el.dataset.hexIndex);
            if (validHexes.includes(idx)) {
                el.style.cursor = 'crosshair';
                el.onclick = async () => {
                    validHexes.forEach(h => this.renderer.highlightHex(h, false));
                    this.renderer.hexLayer.querySelectorAll('.hex-tile').forEach(e => {
                        e.style.cursor = '';
                        e.onclick = null;
                    });
                    await this.moveRobber(player, idx);
                    await this.handleRobberSteal(player, idx);
                };
            }
        });
    }
    
    async moveRobber(player, hexIndex) {
        this.renderer.moveRobber(hexIndex);
        this.game.board.robberPosition = hexIndex;
        this.audio.robber();
        
        const hex = this.game.board.hexes[hexIndex];
        this.addLog(`${player.name} moved robber to ${CONFIG.RESOURCE_EMOJI[hex.terrain]} hex`);
        await Utils.wait(500);
    }
    
    async handleRobberSteal(player, hexIndex) {
        const targets = this.game.getStealTargets(hexIndex, player.index);
        
        if (targets.length === 0) {
            this.game.phase = GAME_PHASE.MAIN;
            this.updateUI();
            return;
        }
        
        if (player.isAI) return; // AI handles in handleRollSeven
        
        // Show steal modal
        const target = await this.promptStealTarget(player, targets);
        if (target !== null) {
            const stolen = this.game.stealFrom(player.index, target);
            if (stolen) {
                this.addLog(`${player.name} stole ${CONFIG.RESOURCE_EMOJI[stolen]} from ${this.game.players[target].name}`, 'warning');
                this.toast.show(`Stole ${CONFIG.RESOURCE_NAMES[stolen]}!`, 'success');
                this.gameStats.steals++;
            }
        }
        
        this.game.phase = GAME_PHASE.MAIN;
        this.updateUI();
    }
    
    promptStealTarget(player, targets) {
        return new Promise(resolve => {
            const content = Utils.createElement('div');
            content.appendChild(Utils.createElement('p', {
                style: { fontFamily: 'var(--font-body)', marginBottom: '1rem' },
                text: 'Choose a player to steal from:'
            }));
            
            const list = Utils.createElement('div', {
                style: { display: 'flex', flexDirection: 'column', gap: '0.5rem' }
            });
            
            targets.forEach(tIdx => {
                const t = this.game.players[tIdx];
                const btn = Utils.createElement('button', {
                    class: 'footer-btn',
                    style: { width: '100%', justifyContent: 'flex-start', padding: '0.75rem 1rem' }
                });
                
                const dot = Utils.createElement('div', {
                    style: {
                        width: '16px', height: '16px', borderRadius: '50%',
                        background: CONFIG.PLAYER_COLORS[tIdx], marginRight: '0.75rem'
                    }
                });
                btn.appendChild(dot);
                btn.appendChild(Utils.createElement('span', {
                    style: { flex: '1', textAlign: 'left' },
                    text: `${t.name} (${t.totalResources} cards)`
                }));
                
                btn.addEventListener('click', () => {
                    this.modals.close();
                    resolve(tIdx);
                });
                
                list.appendChild(btn);
            });
            
            const skipBtn = Utils.createElement('button', {
                class: 'footer-btn',
                style: { width: '100%', marginTop: '0.5rem' },
                text: 'Skip steal'
            });
            skipBtn.addEventListener('click', () => {
                this.modals.close();
                resolve(null);
            });
            list.appendChild(skipBtn);
            
            content.appendChild(list);
            
            this.modals.open('🦹 Choose Victim', content, []);
        });
    }
    
    promptDiscard(player, count) {
        return new Promise(resolve => {
            const content = Utils.createElement('div');
            content.appendChild(Utils.createElement('div', {
                class: 'discard-info',
                html: `⚠ You rolled a 7! Discard <strong>${count}</strong> cards. (You have ${player.totalResources})`
            }));
            
            let toDiscard = { brick: 0, lumber: 0, wool: 0, grain: 0, ore: 0 };
            let discarded = 0;
            
            const grid = Utils.createElement('div', { class: 'discard-grid' });
            content.appendChild(grid);
            
            const summary = Utils.createElement('div', {
                class: 'trade-summary',
                id: 'discardSummary'
            });
            content.appendChild(summary);
            
            const updateGrid = () => {
                grid.innerHTML = '';
                ['brick', 'lumber', 'wool', 'grain', 'ore'].forEach(res => {
                    if (player.resources[res] <= 0) return;
                    const item = Utils.createElement('div', {
                        class: `discard-resource ${toDiscard[res] > 0 ? 'selected' : ''}`,
                        style: { position: 'relative' }
                    });
                    item.appendChild(Utils.createElement('div', {
                        class: `resource-icon res-${res}`,
                        text: CONFIG.RESOURCE_EMOJI[res]
                    }));
                    item.appendChild(Utils.createElement('div', {
                        text: `${toDiscard[res]} / ${player.resources[res]}`
                    }));
                    
                    if (toDiscard[res] > 0) {
                        const badge = Utils.createElement('div', {
                            style: {
                                position: 'absolute', top: '4px', right: '4px',
                                background: 'var(--color-danger)',
                                color: 'white', borderRadius: '50%',
                                width: '18px', height: '18px',
                                fontSize: '0.7rem', fontWeight: '700',
                                display: 'flex', alignItems: 'center', justifyContent: 'center'
                            },
                            text: String(toDiscard[res])
                        });
                        item.appendChild(badge);
                    }
                    
                    item.addEventListener('click', () => {
                        if (discarded < count && toDiscard[res] < player.resources[res]) {
                            toDiscard[res]++;
                            discarded++;
                            updateGrid();
                            updateSummary();
                        }
                    });
                    
                    item.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        if (toDiscard[res] > 0) {
                            toDiscard[res]--;
                            discarded--;
                            updateGrid();
                            updateSummary();
                        }
                    });
                    
                    grid.appendChild(item);
                });
            };
            
            const updateSummary = () => {
                const remaining = count - discarded;
                if (remaining > 0) {
                    summary.textContent = `Discarded: ${discarded} / ${count} — ${remaining} more needed`;
                } else {
                    summary.textContent = `✓ Ready to discard ${count} cards`;
                }
                summary.className = `trade-summary ${discarded === count ? 'valid' : 'invalid'}`;
                if (confirmBtn) confirmBtn.disabled = discarded !== count;
            };
            
            updateGrid();
            updateSummary();
            
            let confirmBtn;
            this.modals.open(`⚠ Discard ${count} Cards — ${player.name}`, content, [
                {
                    text: 'Confirm Discard',
                    class: 'primary',
                    onClick: () => {
                        player.removeResources(toDiscard);
                        this.addLog(`${player.name} discarded ${count} cards`, 'warning');
                        resolve();
                    }
                }
            ]);
            confirmBtn = this.modals.footerEl.querySelector('.footer-btn');
        });
    }
    
    // --------------------------------------------------------
    // MAIN TURN ACTIONS
    // --------------------------------------------------------
    
    async executeAITurn(player) {
        const ai = this.aiPlayers.get(player.index);
        const actions = await ai.takeTurn(this.game, player);
        
        for (const action of actions) {
            await Utils.wait(500);
            await this.executeAIAction(player, action);
            await Utils.wait(300);
        }
        
        // End AI turn
        await this.endTurn();
    }
    
    async executeAIAction(player, action) {
        switch (action.type) {
            case 'playDevCard':
                await this.aiPlayDevCard(player, action);
                break;
            case 'bankTrade':
                this.executeBankTrade(player, action.give, action.get);
                this.addLog(`${player.name} traded with the bank`);
                this.gameStats.trades++;
                break;
            case 'build':
                await this.aiBuildAction(player, action);
                break;
            case 'buyDevCard':
                this.buyDevCard(player);
                break;
        }
    }
    
    async aiPlayDevCard(player, action) {
        const card = player.playDevCard(action.card);
        if (!card) return;
        
        this.audio.cardPlay();
        this.game.hasPlayedDevCardThisTurn = true;
        
        if (action.card === 'knight') {
            this.gameStats.knights++;  // Only count knight cards
            this.addLog(`${player.name} played Knight`, 'important');
            if (action.data.hexIndex !== null) {
                await this.moveRobber(player, action.data.hexIndex);
                if (action.data.stealFrom !== null) {
                    const stolen = this.game.stealFrom(player.index, action.data.stealFrom);
                    if (stolen) {
                        this.addLog(`${player.name} stole ${CONFIG.RESOURCE_EMOJI[stolen]}`, 'warning');
                        this.gameStats.steals++;
                    }
                }
            }
            this.game.updateLargestArmy();
        } else if (action.card === 'yearOfPlenty') {
            this.game.executeYearOfPlenty(player.index, action.data.resources);
            this.addLog(`${player.name} played Year of Plenty`, 'important');
        } else if (action.card === 'roadBuilding') {
            action.data.roads.forEach(edgeId => {
                if (player.pieces.road > 0) {
                    this.game.buildRoad(player.index, edgeId);  // buildRoad already updates longest road
                    this.renderer.placeRoad(edgeId, player.index);
                    this.gameStats.roads++;
                }
            });
            this.addLog(`${player.name} played Road Building`, 'important');
        } else if (action.card === 'monopoly') {
            const total = this.game.executeMonopoly(player.index, action.data.resource);
            this.addLog(`${player.name} played Monopoly on ${CONFIG.RESOURCE_NAMES[action.data.resource]} (+${total})`, 'important');
        }
        
        this.updateUI();
    }
    
    async aiBuildAction(player, action) {
        if (action.building === 'road' && action.edgeId) {
            if (player.canAfford('road') && player.hasPiece('road')) {
                player.pay('road');
                this.game.buildRoad(player.index, action.edgeId);
                this.renderer.placeRoad(action.edgeId, player.index);
                this.audio.build();
                this.gameStats.roads++;
                this.addLog(`${player.name} built a road`);
            }
        } else if (action.building === 'settlement' && action.vertexId) {
            if (player.canAfford('settlement') && player.hasPiece('settlement')) {
                player.pay('settlement');
                this.game.buildSettlement(player.index, action.vertexId);
                this.renderer.placeBuilding('settlement', action.vertexId, player.index);
                this.audio.build();
                this.gameStats.settlements++;
                this.addLog(`${player.name} built a settlement`);
                
                const winner = this.game.checkWin();
                if (winner !== null) {
                    await this.handleVictory(winner);
                }
            }
        } else if (action.building === 'city' && action.vertexId) {
            if (player.canAfford('city') && player.hasPiece('city')) {
                player.pay('city');
                this.game.upgradeToCity(player.index, action.vertexId);
                this.renderer.upgradeToCity(action.vertexId, player.index);
                this.audio.build();
                this.gameStats.cities++;
                this.addLog(`${player.name} upgraded to a city`);
                
                const winner = this.game.checkWin();
                if (winner !== null) {
                    await this.handleVictory(winner);
                }
            }
        }
        
        this.updateUI();
    }
    
    canRoll() {
        if (!this.game) return false;
        if (this.game.phase !== GAME_PHASE.ROLL) return false;
        if (this.game.currentPlayer.isAI) return false;
        return !this.game.hasRolledThisTurn;
    }
    
    canEndTurn() {
        if (!this.game) return false;
        if (this.game.phase === GAME_PHASE.MAIN && !this.game.currentPlayer.isAI) return true;
        return false;
    }
    
    async handleEndTurn() {
        if (!this.canEndTurn()) return;
        
        if (this.settings.get('confirmEndTurn')) {
            this.modals.confirm(
                'End Turn',
                `End your turn and pass to ${this.game.players[(this.game.currentPlayerIndex + 1) % this.game.players.length].name}?`,
                () => this.endTurn()
            );
        } else {
            await this.endTurn();
        }
    }
    
    async endTurn() {
        this.cancelAction();
        
        const prevPlayer = this.game.currentPlayer;
        this.game.nextPlayer();
        this.game.phase = GAME_PHASE.ROLL;
        this.game.hasRolledThisTurn = false;
        this.game.hasBuiltThisTurn = false;
        this.game.hasPlayedDevCardThisTurn = false;
        
        const newPlayer = this.game.currentPlayer;
        this.addLog(`— ${newPlayer.name}'s turn (Round ${this.game.turnNumber}) —`, 'important');
        
        this.updateUI();
        
        if (!newPlayer.isAI) {
            this.showTurnTransition(newPlayer);
        } else {
            await Utils.wait(400);
            await this.rollDice(); // AI rolls automatically
        }
    }
    
    showTurnTransition(player) {
        if (player.isAI) return;
        
        const overlay = document.getElementById('turnTransition');
        document.getElementById('ttIcon').style.color = CONFIG.PLAYER_COLORS[player.index];
        document.getElementById('ttText').textContent = `${player.name}'s Turn`;
        document.getElementById('ttSub').textContent = 'Roll the dice to begin';
        
        overlay.classList.add('active');
        this.audio.turnStart();
        
        setTimeout(() => {
            overlay.classList.remove('active');
        }, 1500);
    }
    
    // --------------------------------------------------------
    // BUILDING ACTIONS (Human)
    // --------------------------------------------------------
    
    startBuildAction(type) {
        const player = this.game.currentPlayer;
        
        if (type === 'road') {
            if (!player.canAfford('road') || !player.hasPiece('road')) {
                this.toast.show('Cannot build road', 'error');
                this.audio.error();
                return;
            }
            this.startBuildRoad(player);
        } else if (type === 'settlement') {
            if (!player.canAfford('settlement') || !player.hasPiece('settlement')) {
                this.toast.show('Cannot build settlement', 'error');
                this.audio.error();
                return;
            }
            this.startBuildSettlement(player);
        } else if (type === 'city') {
            if (!player.canAfford('city') || !player.hasPiece('city') || player.built.settlements.length === 0) {
                this.toast.show('Cannot build city', 'error');
                this.audio.error();
                return;
            }
            this.startBuildCity(player);
        } else if (type === 'devCard') {
            if (!player.canAfford('devCard')) {
                this.toast.show('Cannot afford dev card', 'error');
                this.audio.error();
                return;
            }
            this.buyDevCard(player);
        }
    }
    
    startBuildRoad(player) {
        this.cancelAction();
        this.selectedAction = 'buildRoad';
        this.setStatus('Click an edge to place a road (Esc to cancel)');
        
        const validEdges = this.game.board.edges
            .filter(e => this.game.isValidRoadEdge(e.id, player.index, false))
            .map(e => e.id);
        
        if (validEdges.length === 0) {
            this.toast.show('No valid road positions', 'warning');
            this.cancelAction();
            return;
        }
        
        this.renderer.showValidEdges(validEdges, CONFIG.PLAYER_COLORS[player.index], (edgeId) => {
            player.pay('road');
            this.game.buildRoad(player.index, edgeId);
            this.renderer.placeRoad(edgeId, player.index);
            this.renderer.clearEdgeMarkers();
            this.audio.build();
            this.gameStats.roads++;
            this.addLog(`${player.name} built a road`);
            this.toast.show('Road built!', 'success');
            this.cancelAction();
            this.updateUI();
            
            const winner = this.game.checkWin();
            if (winner !== null) this.handleVictory(winner);
        });
        
        // Hover ghost
        this.renderer.edgeLayer.querySelectorAll('.edge-marker.show').forEach(el => {

            el.addEventListener('mouseleave', () => {
                this.renderer.clearGhost();
            });

        this.setStatus('Click a vertex to place a settlement (Esc to cancel)');
        
        const validVertices = this.game.getValidSettlementVertices(player.index, false);
        
        if (validVertices.length === 0) {

            this.cancelAction();

            this.toast.show('Settlement built!', 'success');
            this.cancelAction();
            this.updateUI();
            
            const winner = this.game.checkWin();
            if (winner !== null) this.handleVictory(winner);
        });

        this.renderer.vertexLayer.querySelectorAll('.vertex-marker.show').forEach(el => {
            el.addEventListener('mouseenter', () => {
                const vertexId = el.dataset.vertexId;

            el.addEventListener('mouseleave', () => {

            this.audio.build();
            this.gameStats.cities++;

            this.toast.show('City built!', 'success');

    buyDevCard(player) {
        if (this.game.devCardDeck.length === 0) {
            this.toast.show('Dev card deck is empty', 'warning');
            return;
        }
        
        if (this.game.hasBuiltThisTurn) {
            this.toast.show('Already bought a dev card this turn', 'warning');
            return;
        }
        
        player.pay('devCard');
        const card = this.game.drawDevCard();
        
        if (!card) {
            this.toast.show('Deck is empty', 'error');
            return;
        }
        
        this.game.hasBuiltThisTurn = true; // Track dev card purchase (reused flag)
        card.turnReceived = this.game.turnNumber;
        player.addDevCard(card);
        
        this.audio.cardDraw();
        
        if (card.type === 'victoryPoint') {
            player.hiddenVP++;
            this.addLog(`${player.name} bought a Victory Point card: ${card.name}`, 'important');
            this.toast.show(`🏆 ${card.name} (+1 VP)`, 'success');
            
            const winner = this.game.checkWin();
            if (winner !== null) this.handleVictory(winner);
        } else {
            const names = {
                knight: 'Knight',
                roadBuilding: 'Road Building',
                yearOfPlenty: 'Year of Plenty',
                monopoly: 'Monopoly'
            };
            this.addLog(`${player.name} bought a ${names[card.type]} card`);
            this.toast.show(`🃏 ${names[card.type]}`, 'info');
        }
        
        this.updateUI();
    }
    
    // --------------------------------------------------------
    // DEV CARD PLAY (Human)
    // --------------------------------------------------------
    
    playDevCard(type) {
        const player = this.game.currentPlayer;
        
        if (!player.canPlayDevCard(type, this.game.turnNumber)) {
            this.toast.show('Cannot play this card now', 'error');
            this.audio.error();
            return;
        }
        
        if (this.game.hasPlayedDevCardThisTurn && type !== 'victoryPoint') {
            this.toast.show('You can only play one development card per turn', 'error');
            this.audio.error();
            return;
        }

        if (type === 'knight') {
            this.startPlayKnight(player);
        } else if (type === 'roadBuilding') {
            this.startPlayRoadBuilding(player);
        } else if (type === 'yearOfPlenty') {
            this.startPlayYearOfPlenty(player);
        } else if (type === 'monopoly') {
            this.startPlayMonopoly(player);
        }
    }
    
    /**
     * Start playing a Knight card
     */
    async startPlayKnight(player) {
        const card = player.playDevCard('knight');
        if (!card) return;
        
        this.audio.cardPlay();
        this.game.hasPlayedDevCardThisTurn = true;
        this.gameStats.knights++;
        this.addLog(`${player.name} played a Knight`, 'important');
        
        this.setStatus('Move the robber to any hex');
        
        const validHexes = this.game.board.hexes
            .filter(h => h.index !== this.game.board.robberPosition)
            .map(h => h.index);
            
        validHexes.forEach(h => this.renderer.highlightHex(h, true));
        
        this.renderer.hexLayer.querySelectorAll('.hex-tile').forEach(el => {
            const idx = parseInt(el.dataset.hexIndex);
            if (validHexes.includes(idx)) {
                el.style.cursor = 'pointer';
                el.onclick = async () => {
                    validHexes.forEach(h => this.renderer.highlightHex(h, false));
                    this.renderer.hexLayer.querySelectorAll('.hex-tile').forEach(e => {
                        e.style.cursor = '';
                        e.onclick = null;
                    });
                    await this.moveRobber(player, idx);
                    await this.handleRobberSteal(player, idx);
                    this.game.updateLargestArmy();
                    this.updateUI();
                };
            }
        });
    }
    
    /**
     * Start playing Road Building card
     */
    async startPlayRoadBuilding(player) {
        const card = player.playDevCard('roadBuilding');
        if (!card) return;
        
        this.audio.cardPlay();
        this.game.hasPlayedDevCardThisTurn = true;
        this.addLog(`${player.name} played Road Building`, 'important');
        
        let roadsToPlace = Math.min(2, player.pieces.road);
        if (roadsToPlace === 0) {
            this.toast.show('No roads left to place', 'warning');
            this.updateUI();
            return;
        }
        
        const placeNextRoad = async () => {
            if (roadsToPlace <= 0) {
                this.updateUI();
                return;
            }
            
            this.setStatus(`Place a road (${roadsToPlace} remaining)`);
            const validEdges = this.game.board.edges
                .filter(e => this.game.isValidRoadEdge(e.id, player.index, false))
                .map(e => e.id);
                
            if (validEdges.length === 0) {
                this.toast.show('No valid road positions', 'warning');
                this.updateUI();
                return;
            }
            
            this.renderer.showValidEdges(validEdges, CONFIG.PLAYER_COLORS[player.index], async (edgeId) => {
                this.game.buildRoad(player.index, edgeId);
                this.renderer.placeRoad(edgeId, player.index);
                this.renderer.clearEdgeMarkers();
                this.audio.build();
                this.gameStats.roads++;
                this.addLog(`${player.name} built a free road`);
                roadsToPlace--;
                
                const winner = this.game.checkWin();
                if (winner !== null) {
                    await this.handleVictory(winner);
                    return;
                }
                
                await placeNextRoad();
            });
        };
        
        await placeNextRoad();
    }

        content.appendChild(Utils.createElement('p', {
            style: { fontFamily: 'var(--font-body)', marginBottom: '1rem' },

        });

            grid.innerHTML = '';
            ['brick', 'lumber', 'wool', 'grain', 'ore'].forEach(res => {
                const count = chosen.filter(r => r === res).length;
                const item = Utils.createElement('div', {
                    class: `discard-resource ${count > 0 ? 'selected' : ''}`,
                    style: { position: 'relative', cursor: chosen.length < 2 || count > 0 ? 'pointer' : 'not-allowed' }
                });

    // TRADING SYSTEM
    // --------------------------------------------------------
    
    openBankTradeModal() {
        const player = this.game.currentPlayer;
        const content = Utils.createElement('div');
        
        // Port-aware trade rates
        const getRate = (res) => {
            if (player.ports.has(res)) return 2;
            if (player.ports.has('generic')) return 3;
            return 4;
        };
        
        const portSummary = ['brick', 'lumber', 'wool', 'grain', 'ore']
            .map(res => `${CONFIG.RESOURCE_EMOJI[res]} ${getRate(res)}:1`).join('  ');
        
        content.appendChild(Utils.createElement('div', {
            class: 'trade-summary',
            style: { marginBottom: '1rem', fontSize: '0.8rem' },
            text: `Your rates: ${portSummary}`
        }));
        
        const giveRes = { brick: 0, lumber: 0, wool: 0, grain: 0, ore: 0 };
        const getRes = { brick: 0, lumber: 0, wool: 0, grain: 0, ore: 0 };
        
        const grid = Utils.createElement('div', { class: 'trade-grid' });
        
        const giveSide = Utils.createElement('div', { class: 'trade-side' });
        giveSide.appendChild(Utils.createElement('div', { class: 'trade-side-title', text: 'You Give' }));
        
        const getSide = Utils.createElement('div', { class: 'trade-side' });
        getSide.appendChild(Utils.createElement('div', { class: 'trade-side-title', text: 'You Get' }));
        
        const updateUI = () => {
            giveSide.querySelectorAll('.trade-resource-row').forEach(row => row.remove());
            getSide.querySelectorAll('.trade-resource-row').forEach(row => row.remove());
            
            ['brick', 'lumber', 'wool', 'grain', 'ore'].forEach(res => {
                const rate = getRate(res);
                const gRow = Utils.createElement('div', { class: 'trade-resource-row' });
                gRow.appendChild(Utils.createElement('div', { class: `resource-icon res-${res}`, text: CONFIG.RESOURCE_EMOJI[res] }));
                gRow.appendChild(Utils.createElement('div', { class: 'trade-resource-name', text: `${CONFIG.RESOURCE_NAMES[res]} (${rate}:1)` }));
                
                const gCounter = Utils.createElement('div', { class: 'trade-counter' });
                const gMinus = Utils.createElement('button', { class: 'trade-counter-btn', text: '-' });
                gMinus.disabled = giveRes[res] <= 0;
                gMinus.onclick = () => { giveRes[res]--; updateUI(); };
                const gVal = Utils.createElement('span', { class: 'trade-counter-value', text: giveRes[res].toString() });
                const gPlus = Utils.createElement('button', { class: 'trade-counter-btn', text: '+' });
                gPlus.disabled = giveRes[res] >= player.resources[res] || giveRes[res] >= rate;
                gPlus.onclick = () => { giveRes[res]++; updateUI(); };
                gCounter.append(gMinus, gVal, gPlus);
                gRow.appendChild(gCounter);
                giveSide.appendChild(gRow);
                
                const rRow = Utils.createElement('div', { class: 'trade-resource-row' });
                rRow.appendChild(Utils.createElement('div', { class: `resource-icon res-${res}`, text: CONFIG.RESOURCE_EMOJI[res] }));
                rRow.appendChild(Utils.createElement('div', { class: 'trade-resource-name', text: CONFIG.RESOURCE_NAMES[res] }));
                
                const rCounter = Utils.createElement('div', { class: 'trade-counter' });
                const rMinus = Utils.createElement('button', { class: 'trade-counter-btn', text: '-' });
                rMinus.disabled = getRes[res] <= 0;
                rMinus.onclick = () => { getRes[res]--; updateUI(); };
                const rVal = Utils.createElement('span', { class: 'trade-counter-value', text: getRes[res].toString() });
                const rPlus = Utils.createElement('button', { class: 'trade-counter-btn', text: '+' });
                rPlus.disabled = getRes[res] >= 3; // Allow getting up to 3
                rPlus.onclick = () => { getRes[res]++; updateUI(); };
                rCounter.append(rMinus, rVal, rPlus);
                rRow.appendChild(rCounter);
                getSide.appendChild(rRow);
            });
            
            const giveKeys = Object.entries(giveRes).filter(([_, v]) => v > 0);
            const getKey = Object.keys(getRes).find(r => getRes[r] > 0);
            const totalGet = Object.values(getRes).reduce((a, b) => a + b, 0);
            
            let isValid = false;
            let message = 'Select resources to trade';
            
            if (totalGet >= 1 && giveKeys.length === 1) {
                const [gRes, gAmt] = giveKeys[0];
                const rate = getRate(gRes);
                if (gAmt > 0 && gAmt % rate === 0 && totalGet === gAmt / rate) {
                    isValid = true;
                    const getStr = Object.entries(getRes).filter(([_, v]) => v > 0).map(([r, c]) => `${c > 1 ? c + '×' : ''}${CONFIG.RESOURCE_NAMES[r]}`).join(' + ');
                    message = `Trade ${gAmt} ${CONFIG.RESOURCE_NAMES[gRes]} → ${getStr}`;
                } else if (totalGet > gAmt / rate) {
                    message = `Too many resources requested (max ${Math.floor(gAmt / rate)} for ${gAmt} given)`;
                } else {
                    message = `Need ${rate * totalGet} ${CONFIG.RESOURCE_NAMES[gRes]} (${rate}:1 rate)`;
                }
            } else if (totalGet > 1 && giveKeys.length > 1) {
                message = 'Give only one type of resource at a time';
            } else if (totalGet === 0) {
                message = 'Select resources to receive';
            } else if (giveKeys.length === 0) {
                message = 'Select resources to give';
            }
            
            summary.textContent = message;
            summary.className = `trade-summary ${isValid ? 'valid' : 'invalid'}`;
            confirmBtn.disabled = !isValid;
        };
        
        grid.appendChild(giveSide);
        grid.appendChild(Utils.createElement('div', { class: 'trade-arrow', text: '⇄' }));
        grid.appendChild(getSide);
        content.appendChild(grid);
        
        const summary = Utils.createElement('div', { class: 'trade-summary' });
        content.appendChild(summary);
        
        let confirmBtn;
        this.modals.open('🏦 Bank Trade', content, [
            { text: 'Cancel' },
            {
                text: 'Execute Trade',
                class: 'primary',
                disabled: true,
                onClick: () => {
                    const give = {};
                    const get = {};
                    Object.keys(giveRes).forEach(r => { if (giveRes[r] > 0) give[r] = giveRes[r]; });
                    Object.keys(getRes).forEach(r => { if (getRes[r] > 0) get[r] = getRes[r]; });
                    
                    this.executeBankTrade(player, give, get);
                    this.addLog(`${player.name} traded with the bank`, 'success');
                    this.gameStats.trades++;
                    this.audio.trade();
                    this.updateUI();
                }
            }
        ]);
        confirmBtn = this.modals.footerEl.querySelectorAll('.footer-btn')[1];
        updateUI();
    }
    
    executeBankTrade(player, give, get) {
        player.removeResources(give);
        player.addResources(get);
        // Update bank
        if (this.game.bank) {
            Object.entries(give).forEach(([res, amt]) => { this.game.bank[res] = (this.game.bank[res] || 0) + amt; });
            Object.entries(get).forEach(([res, amt]) => { this.game.bank[res] = Math.max(0, (this.game.bank[res] || 0) - amt); });
        }
    }

                    Object.keys(giveRes).forEach(r => { if (giveRes[r] > 0) give[r] = giveRes[r]; });
                    Object.keys(getRes).forEach(r => { if (getRes[r] > 0) get[r] = getRes[r]; });
                    
                    await this.executePlayerTrade(player, give, get);
                }
            }
        ]);
        confirmBtn = this.modals.footerEl.querySelectorAll('.footer-btn')[1];
        updateUI();
    }
    
    async executePlayerTrade(initiator, give, get) {
        this.modals.close();
        
        // In a local hotseat game, we ask each opponent if they want to accept
        const opponents = this.game.players.filter(p => p.index !== initiator.index);
        
        for (const opp of opponents) {
            // Check if opponent CAN accept
            let canAccept = true;
            Object.entries(get).forEach(([res, amt]) => {
                if (opp.resources[res] < amt) canAccept = false;
            });
            
            if (!canAccept) continue;

            // AI opponents auto-respond based on simple logic
            if (opp.isAI) {
                const ai = this.aiPlayers.get(opp.index);
                // AI accepts if what they receive is something they need
                const needs = ai ? ai.identifyResourceNeeds(this.game, opp) : [];
                const theyReceive = Object.keys(give);
                const theyGive = Object.keys(get);
                
                // Check if what opp receives is useful
                const useful = theyReceive.some(r => needs.includes(r));
                // Check if what opp gives away they have surplus of
                const hasSurplus = theyGive.every(r => {
                    const needed = get[r];
                    return opp.resources[r] >= needed + 2; // Keep a buffer
                });
                
                const aiAccepts = useful && hasSurplus && Math.random() > 0.25;
                if (aiAccepts) {
                    initiator.removeResources(give);
                    initiator.addResources(get);
                    opp.removeResources(get);
                    opp.addResources(give);
                    
                    this.audio.trade();
                    this.addLog(`${initiator.name} traded with ${opp.name} (AI accepted)`, 'success');
                    this.gameStats.trades++;
                    this.updateUI();
                    return;
                }
                continue; // AI rejected
            }
            
            // Prompt human opponent
            const accepted = await this.promptTradeResponse(initiator, opp, give, get);
            if (accepted) {
                // Execute trade
                initiator.removeResources(give);
                initiator.addResources(get);
                opp.removeResources(get);
                opp.addResources(give);
                
                this.audio.trade();
                this.addLog(`${initiator.name} traded with ${opp.name}`, 'success');
                this.gameStats.trades++;
                this.updateUI();
                return; // Trade successful, end turn phase for trading
            }
        }
        
        this.toast.show('No player accepted the trade', 'warning');
    }
    
    promptTradeResponse(initiator, opponent, give, get) {
        return new Promise(resolve => {
            const giveStr = Object.entries(give).map(([r, a]) => `${a} ${CONFIG.RESOURCE_EMOJI[r]}`).join(', ');
            const getStr = Object.entries(get).map(([r, a]) => `${a} ${CONFIG.RESOURCE_EMOJI[r]}`).join(', ');
            
            const content = Utils.createElement('div', {
                style: { textAlign: 'center', fontFamily: 'var(--font-body)' }
            });
            content.appendChild(Utils.createElement('p', {
                html: `<strong>${initiator.name}</strong> offers <strong>${giveStr}</strong> for <strong>${getStr}</strong>.`
            }));
            content.appendChild(Utils.createElement('p', {
                text: `${opponent.name}, do you accept this trade?`,
                style: { marginTop: '1rem', fontSize: '1.1rem' }
            }));
            
            this.modals.open(`Trade Response (${opponent.name})`, content, [
                { text: 'Reject', class: 'danger', onClick: () => resolve(false) },
                { text: 'Accept', class: 'primary', onClick: () => resolve(true) }
            ]);
        });
    }

    renderCardsTab() {
        const container = document.getElementById('tab-cards');

        if (player.isAI) {
            // Show AI card counts (hidden types) for all players
            const info = Utils.createElement('div', { class: 'empty-state' });
            info.innerHTML = '<div class="empty-state-icon">🃏</div>';
            this.game.players.forEach(p => {
                const unplayed = p.devCards.filter(c => !c.played && c.type !== 'victoryPoint').length;
                const vp = p.devCards.filter(c => !c.played && c.type === 'victoryPoint').length;
                const played = p.devCards.filter(c => c.played).length;
                info.innerHTML += `<div style="margin:0.3rem 0;font-size:0.85rem"><span style="color:${CONFIG.PLAYER_COLORS[p.index]}">${p.name}</span>: ${unplayed} card(s)${played ? ` (${played} played)` : ''}</div>`;
            });
            container.appendChild(info);
            return;
        }
        
        const list = Utils.createElement('div', { class: 'dev-cards-list' });
        
        const cardTypes = [
            { type: 'knight', icon: '⚔️', name: 'Knight' },
            { type: 'roadBuilding', icon: '🛤', name: 'Road Building' },
            { type: 'yearOfPlenty', icon: '🌟', name: 'Year of Plenty' },
            { type: 'monopoly', icon: '💸', name: 'Monopoly' },
            { type: 'victoryPoint', icon: '🏆', name: 'Victory Point' }
        ];
        
        let hasCards = false;
        
        cardTypes.forEach(ct => {
            const unplayed = player.devCards.filter(c => c.type === ct.type && !c.played).length;
            const played = player.devCards.filter(c => c.type === ct.type && c.played).length;
            const total = unplayed + played;
            if (total === 0) return;
            
            hasCards = true;
            
            const canPlay = ct.type !== 'victoryPoint' && 
                            player.canPlayDevCard(ct.type, this.game.turnNumber) && 
                            !this.game.hasPlayedDevCardThisTurn &&
                            this.game.phase === GAME_PHASE.MAIN;
            
            // Show unplayed cards
            if (unplayed > 0) {
                const row = Utils.createElement('div', {
                    class: `dev-card-row ${canPlay ? 'playable' : ''}`
                });
                
                const info = Utils.createElement('div', { class: 'dev-card-info' });
                info.appendChild(Utils.createElement('span', { text: `${ct.icon} ${ct.name}` }));
                if (canPlay) {
                    info.appendChild(Utils.createElement('span', {
                        style: { fontSize: '0.65rem', color: 'var(--color-gold)', marginLeft: '0.4rem' },
                        text: '(click to play)'
                    }));
                }
                row.appendChild(info);
                row.appendChild(Utils.createElement('span', { class: 'dev-card-count', text: `×${unplayed}` }));
                
                if (canPlay) {
                    row.onclick = () => this.playDevCard(ct.type);
                }
                
                list.appendChild(row);
            }
            
            // Show played cards (grayed out)
            if (played > 0) {
                const row = Utils.createElement('div', { class: 'dev-card-row used' });
                const info = Utils.createElement('div', { class: 'dev-card-info' });
                info.appendChild(Utils.createElement('span', { 
                    style: { textDecoration: 'line-through', color: 'var(--color-text-muted)' },
                    text: `${ct.icon} ${ct.name}` 
                }));
                row.appendChild(info);
                row.appendChild(Utils.createElement('span', { 
                    class: 'dev-card-count',
                    style: { opacity: '0.5' },
                    text: `×${played} used` 
                }));
                list.appendChild(row);
            }
        });
        
        if (!hasCards) {
            container.appendChild(Utils.createElement('div', {
                class: 'empty-state',
                html: `<div class="empty-state-icon">🃏</div>No development cards yet.`
            }));
        } else {
            container.appendChild(list);
            
            if (this.game.hasPlayedDevCardThisTurn) {
                container.appendChild(Utils.createElement('div', {
                    style: { fontSize: '0.75rem', color: 'var(--color-warning)', marginTop: '0.5rem', textAlign: 'center' },
                    text: '⚠ Already played a card this turn'
                }));
            }
        }
    }

    addLog(message, type = 'normal') {
        const container = document.getElementById('tab-log');
        const entry = Utils.createElement('div', { class: `log-entry ${type}` });
        entry.innerHTML = `<span class="log-time">${Utils.timeString()}</span> ${Utils.escapeHtml(message)}`;
        container.insertBefore(entry, container.firstChild);
        
        // Keep log to max 60 entries for performance
        const children = container.children;
        while (children.length > 60) {
            container.removeChild(children[children.length - 1]);
        }
    }
    
    cancelAction() {
        this.selectedAction = null;
        if (this.renderer) {
            this.renderer.clearVertexMarkers();
            this.renderer.clearEdgeMarkers();
            this.renderer.clearGhost();
        }
        this.setStatus('Awaiting your command...');
    }
    
    showFloatingResources(vertexId, resources) {
        const vertex = this.game.board.vertices.find(v => v.id === vertexId);
        if (!vertex || !this.renderer) return;
        
        const pos = this.renderer.getHexScreenPosition(this.game.board.hexes[vertex.hexes[0]].index);
        if (!pos) return;
        
        let offset = 0;
        Object.entries(resources).forEach(([res, count]) => {
            FloatingResource.show(pos.x + offset, pos.y - 40, CONFIG.RESOURCE_EMOJI[res], count);
            offset += 30;
        });
    }
