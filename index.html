    /**
     * Create SVG filters for effects
     */
    createFilters() {
        // Drop shadow filter
        const shadow = this.createSVGElement('filter', { id: 'shadow', x: '-50%', y: '-50%', width: '200%', height: '200%' });
        shadow.innerHTML = `
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        `;
        this.defs.appendChild(shadow);
        
        // Glow filter
        const glow = this.createSVGElement('filter', { id: 'glow', x: '-50%', y: '-50%', width: '200%', height: '200%' });
        glow.innerHTML = `
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        `;
        this.defs.appendChild(glow);
    }
    
    /**
     * Create gradients
     */
    createGradients() {
        CONFIG.PLAYER_COLORS.forEach((color, i) => {
            const grad = this.createSVGElement('radialGradient', { id: `player-grad-${i}`, cx: '30%', cy: '30%' });
            grad.innerHTML = `
                <stop offset="0%" stop-color="${this.lighten(color, 30)}"/>
                <stop offset="100%" stop-color="${color}"/>
            `;
            this.defs.appendChild(grad);
        });
    }
    
    /**
     * Lighten a hex color
     */
    lighten(hex, percent) {
        const num = parseInt(hex.replace('#', ''), 16);
        const amt = Math.round(2.55 * percent);
        const R = Math.min(255, (num >> 16) + amt);
        const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
        const B = Math.min(255, (num & 0x0000FF) + amt);
        return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
    }
    
    /**
     * Render the complete board
     */
    renderBoard(board) {
        this.board = board;
        
        // Clear
        while (this.svg.firstChild) this.svg.removeChild(this.svg.firstChild);
        
        this.initDefs();
        
        // Ocean background
        const ocean = this.createSVGElement('rect', {
            x: -2000, y: -2000, width: 4000, height: 4000,
            fill: 'url(#ocean-gradient)'
        });
        this.svg.appendChild(ocean);
        
        // Main board group with transforms
        this.boardGroup = this.createSVGElement('g', { class: 'board-group' });
        this.svg.appendChild(this.boardGroup);
        
        // Layer ordering
        this.hexLayer = this.createSVGElement('g', { class: 'hex-layer' });
        this.edgeLayer = this.createSVGElement('g', { class: 'edge-layer' });
        this.vertexLayer = this.createSVGElement('g', { class: 'vertex-layer' });
        this.buildingLayer = this.createSVGElement('g', { class: 'building-layer' });
        this.robberGroup = this.createSVGElement('g', { class: 'robber-group' });
        this.tooltipGroup = this.createSVGElement('g', { class: 'tooltip-layer' });
        
        this.boardGroup.appendChild(this.hexLayer);
        this.boardGroup.appendChild(this.edgeLayer);
        this.boardGroup.appendChild(this.vertexLayer);
        this.boardGroup.appendChild(this.buildingLayer);
        this.boardGroup.appendChild(this.robberGroup);
        this.boardGroup.appendChild(this.tooltipGroup);
        
        // Render each layer
        this.renderHexes();
        this.renderPorts();
        this.renderEdges();
        this.renderVertices();
        this.renderRobber();
        
        this.updateViewBox();
    }
    
    /**
     * Render port indicators
     */
    renderPorts() {
        if (!this.board.ports) return;
        
        const portColors = {
            generic: '#d4a64a',
            brick: '#b54a3e',
            lumber: '#5d8a3a',
            wool: '#e8e4d0',
            grain: '#e8c547',
            ore: '#6e7580'
        };
        const portLabels = {
            generic: '3:1', brick: '2:1', lumber: '2:1',
            wool: '2:1', grain: '2:1', ore: '2:1'
        };
        const portEmoji = {
            generic: '🏦', brick: '🧱', lumber: '🪵',
            wool: '🐑', grain: '🌾', ore: '⛏'
        };
        
        const portLayer = this.createSVGElement('g', { class: 'port-layer' });
        this.boardGroup.insertBefore(portLayer, this.hexLayer);
        
        this.board.ports.forEach(port => {
            const edge = this.board.edges.find(e => e.id === port.edgeId);
            if (!edge) return;
            
            const mx = (edge.x1 + edge.x2) / 2;
            const my = (edge.y1 + edge.y2) / 2;
            
            const color = portColors[port.type] || '#ffffff';
            const label = portLabels[port.type] || '?';
            const emoji = portEmoji[port.type] || '?';
            
            const g = this.createSVGElement('g', {
                transform: `translate(${mx}, ${my})`,
                class: 'port-marker'
            });
            
            // Outer ring for visibility
            const outerRing = this.createSVGElement('circle', {
                cx: 0, cy: 0, r: 19,
                fill: 'rgba(0,0,0,0.5)',
                'stroke-width': 0
            });
            g.appendChild(outerRing);
            
            // Background circle
            const circle = this.createSVGElement('circle', {
                cx: 0, cy: 0, r: 17,
                fill: color,
                stroke: 'rgba(255,255,255,0.4)',
                'stroke-width': 1.5,
                opacity: 0.95
            });
            g.appendChild(circle);
            
            // Port label (rate)
            const text = this.createSVGElement('text', {
                x: 0, y: -4,
                'text-anchor': 'middle',
                'dominant-baseline': 'central',
                'font-size': '8',
                'font-weight': '700',
                fill: port.type === 'wool' ? '#2a2a2a' : '#ffffff',
                'font-family': 'var(--font-display, sans-serif)',
                'pointer-events': 'none'
            });
            text.textContent = label;
            g.appendChild(text);
            
            const subText = this.createSVGElement('text', {
                x: 0, y: 8,
                'text-anchor': 'middle',
                'dominant-baseline': 'central',
                'font-size': '9',
                fill: port.type === 'wool' ? '#2a2a2a' : '#ffffff',
                'pointer-events': 'none'
            });
            subText.textContent = emoji;
            g.appendChild(subText);
            
            portLayer.appendChild(g);
            
            // Draw dashed lines to port vertices to show which spots have port access
            port.vertices.forEach(vId => {
                const vertex = this.board.vertices.find(v => v.id === vId);
                if (!vertex) return;
                const line = this.createSVGElement('line', {
                    x1: mx, y1: my,
                    x2: vertex.x, y2: vertex.y,
                    stroke: color,
                    'stroke-width': '2',
                    'stroke-dasharray': '4,3',
                    opacity: '0.7',
                    'pointer-events': 'none'
                });
                portLayer.insertBefore(line, g);
            });
        });
    }
    
    /**
     * Render hex tiles
     */
    renderHexes() {
        this.board.hexes.forEach(hex => {
            const group = this.createSVGElement('g', {
                class: 'hex-tile',
                'data-hex-index': hex.index
            });
            
            const corners = this.grid.getCorners(hex.position.x, hex.position.y, CONFIG.HEX_INNER_RADIUS);
            const points = corners.map(c => `${c.x},${c.y}`).join(' ');
            
            // Main hex shape with pattern
            const patternId = {
                brick: 'pattern-brick',
                lumber: 'pattern-forest',
                wool: 'pattern-pasture',
                grain: 'pattern-field',
                ore: 'pattern-mountain',
                desert: 'pattern-desert'
            }[hex.terrain];
            
            const shape = this.createSVGElement('polygon', {
                class: 'hex-shape',
                points,
                fill: `url(#${patternId})`,
                stroke: CONFIG.TERRAIN_COLORS[hex.terrain].stroke,
                'stroke-width': '3',
                filter: 'url(#shadow)'
            });
            group.appendChild(shape);
            
            // Decorative border
            const border = this.createSVGElement('polygon', {
                points,
                fill: 'none',
                stroke: 'rgba(255, 255, 255, 0.15)',
                'stroke-width': '1'
            });
            group.appendChild(border);
            
            // Number token (if not desert)
            if (hex.token !== null) {
                const tokenGroup = this.createSVGElement('g', {
                    class: 'number-token',
                    transform: `translate(${hex.position.x}, ${hex.position.y})`
                });
                
                const circle = this.createSVGElement('circle', {
                    class: 'number-circle',
                    cx: 0, cy: 0, r: 20
                });
                tokenGroup.appendChild(circle);
                
                const text = this.createSVGElement('text', {
                    class: 'number-text',
                    x: 0, y: 0
                });
                text.textContent = hex.token;
                if (hex.token === 6 || hex.token === 8) {
                    text.setAttribute('fill', '#b91c1c');
                }
                tokenGroup.appendChild(text);
                
                // Probability dots - rendered as individual circles for clarity
                const dots = CONFIG.PROBABILITY_DOTS[hex.token];
                if (dots) {
                    const dotColor = (hex.token === 6 || hex.token === 8) ? '#b91c1c' : '#5a3e1c';
                    const dotSpacing = 5.5;
                    const totalWidth = (dots - 1) * dotSpacing;
                    for (let d = 0; d < dots; d++) {
                        const dot = this.createSVGElement('circle', {
                            cx: d * dotSpacing - totalWidth / 2,
                            cy: 12,
                            r: '2',
                            fill: dotColor,
                            'pointer-events': 'none'
                        });
                        tokenGroup.appendChild(dot);
                    }
                }
                
                group.appendChild(tokenGroup);
            }
            
            // Terrain icon overlay
            const icon = this.createSVGElement('text', {
                x: hex.position.x,
                y: hex.position.y - 35,
                'text-anchor': 'middle',
                'font-size': '24',
                'pointer-events': 'none',
                opacity: '0.7'
            });
            icon.textContent = CONFIG.RESOURCE_EMOJI[hex.terrain];
            group.appendChild(icon);
            
            this.hexLayer.appendChild(group);
        });
    }

     * Render edge markers (road positions)

        this.board.edges.forEach(edge => {
            const line = this.createSVGElement('line', {
                class: 'edge-marker',
                'data-edge-id': edge.id,
                x1: edge.x1, y1: edge.y1,
                x2: edge.x2, y2: edge.y2,
                stroke: 'transparent',
                'stroke-width': '12',

            this.edgeLayer.appendChild(line);
        });

    /**

        this.board.vertices.forEach(vertex => {

                class: 'vertex-marker',
                'data-vertex-id': vertex.id,

            const circle = this.createSVGElement('circle', {

        });

        this.board.robberPosition = hexIndex;
        const { x, y } = hex.position;

        if (type === 'settlement') {

                d: 'M -12 8 L -12 -4 L 0 -14 L 12 -4 L 12 8 Z',

                stroke: '#2a2a2a',
                'stroke-width': '2'
            });
            group.appendChild(house);
            
            // Door
            const door = this.createSVGElement('rect', {
                x: -3, y: 0, width: 6, height: 8,
                fill: '#2a2a2a'
            });
            group.appendChild(door);
            
            // Window

                x: -8, y: -3, width: 4, height: 4,

            });

            const window2 = this.createSVGElement('rect', {
                x: 4, y: -3, width: 4, height: 4,
                fill: '#f8f5ec'
            });
            group.appendChild(window2);
            
            // Roof accent

                fill: `url(#player-grad-${playerIndex})`,
                stroke: '#2a2a2a',
                'stroke-width': '2'
            });
            group.appendChild(main);
            
            // Tower
            const tower = this.createSVGElement('rect', {
                x: 6, y: -18, width: 8, height: 14,
                fill: `url(#player-grad-${playerIndex})`,
                stroke: '#2a2a2a',
                'stroke-width': '2'
            });
            group.appendChild(tower);
            
            // Battlement
            const battle = this.createSVGElement('path', {
                d: 'M 6 -18 L 6 -22 L 8 -22 L 8 -20 L 10 -20 L 10 -22 L 12 -22 L 12 -20 L 14 -20 L 14 -18',
                fill: `url(#player-grad-${playerIndex})`,
                stroke: '#2a2a2a',
                'stroke-width': '1'
            });
            group.appendChild(battle);
            
            // Door
            const door = this.createSVGElement('path', {
                d: 'M -4 10 L -4 2 Q 0 -2 4 2 L 4 10',

            });

    /**
     * Upgrade settlement to city
     */
    upgradeToCity(vertexId, playerIndex) {
        const existing = this.buildingLayer.querySelector(`[data-vertex-id="${vertexId}"]`);
        if (existing) {
            existing.style.transition = 'transform 0.3s';
            existing.style.transform = 'scale(0) rotate(180deg)';
            setTimeout(() => {
                existing.remove();
                this.placeBuilding('city', vertexId, playerIndex, true);
            }, 300);
        }
    }
    
    /**
     * Place a road
     */
    placeRoad(edgeId, playerIndex, animate = true) {
        const edge = this.board.edges.find(e => e.id === edgeId);
        if (!edge) return;
        
        const color = CONFIG.PLAYER_COLORS[playerIndex];
        
        // Calculate angle
        const dx = edge.x2 - edge.x1;
        const dy = edge.y2 - edge.y1;
        const length = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        const mx = (edge.x1 + edge.x2) / 2;
        const my = (edge.y1 + edge.y2) / 2;
        
        const road = this.createSVGElement('g', {
            class: 'road-segment',
            'data-edge-id': edgeId,
            'data-player': playerIndex,
            transform: `translate(${mx}, ${my}) rotate(${angle})`
        });
        
        const roadShape = this.createSVGElement('rect', {
            x: -length / 2,
            y: -4,
            width: length,
            height: 8,
            rx: 2,
            fill: color,
            stroke: '#2a2a2a',
            'stroke-width': '1.5'
        });
        road.appendChild(roadShape);
        
        // Wood grain lines
        const line1 = this.createSVGElement('line', {
            x1: -length / 2 + 4, y1: 0,
            x2: length / 2 - 4, y2: 0,
            stroke: 'rgba(0,0,0,0.3)',
            'stroke-width': '1'
        });
        road.appendChild(line1);
        
        if (animate) {
            road.style.transformOrigin = 'center';
            road.style.transform = `translate(${mx}px, ${my}px) rotate(${angle}deg) scaleX(0)`;
            road.setAttribute('transform', `translate(${mx}, ${my}) rotate(${angle}) scale(0, 1)`);
            this.buildingLayer.insertBefore(road, this.buildingLayer.firstChild);
            requestAnimationFrame(() => {
                road.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
                road.setAttribute('transform', `translate(${mx}, ${my}) rotate(${angle}) scale(1, 1)`);
            });
        } else {
            this.buildingLayer.insertBefore(road, this.buildingLayer.firstChild);
        }
    }

    /**

    showGhostRoad(edgeId, playerIndex) {

        if (!edge) return;

    /**
     * Setup panning and zooming
     */
    setupPanning() {
        let isPanning = false;
        let startPoint = { x: 0, y: 0 };
        let startPan = { x: 0, y: 0 };
        
        this.svg.addEventListener('mousedown', (e) => {
            // Don't start panning if there are active markers (placement mode)
            const hasActiveMarkers = this.vertexLayer.querySelector('.vertex-marker.show') ||
                                     this.edgeLayer.querySelector('.edge-marker.show');
            if (hasActiveMarkers) return;
            if (e.target === this.svg || e.target.tagName === 'rect' || 
                (e.target.tagName === 'polygon' && !e.target.closest('.building')) ||
                e.target.tagName === 'ellipse') {
                isPanning = true;
                startPoint = { x: e.clientX, y: e.clientY };
                startPan = { ...this.pan };
                this.svg.style.cursor = 'grabbing';
            }
        });
        
        window.addEventListener('mousemove', (e) => {
            if (isPanning) {
                const scale = this.viewBox.w / this.svg.clientWidth;
                const dx = (e.clientX - startPoint.x) * scale;
                const dy = (e.clientY - startPoint.y) * scale;
                this.pan = {
                    x: startPan.x - dx,
                    y: startPan.y - dy
                };
                this.updateViewBox();
            }
        });
        
        window.addEventListener('mouseup', () => {
            isPanning = false;
            this.svg.style.cursor = 'grab';
        });
        
        this.svg.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 1.1 : 0.9;
            this.zoom = Utils.clamp(this.zoom * delta, 0.5, 3);
            this.updateViewBox();
        }, { passive: false });
        
        // Touch support
        let lastTouchDist = 0;
        this.svg.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isPanning = true;
                startPoint = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                startPan = { ...this.pan };
            } else if (e.touches.length === 2) {
                lastTouchDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            }
        });
        
        this.svg.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && isPanning) {
                const scale = this.viewBox.w / this.svg.clientWidth;
                const dx = (e.touches[0].clientX - startPoint.x) * scale;
                const dy = (e.touches[0].clientY - startPoint.y) * scale;
                this.pan = {
                    x: startPan.x - dx,
                    y: startPan.y - dy
                };
                this.updateViewBox();
            } else if (e.touches.length === 2) {
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                if (lastTouchDist > 0) {
                    const delta = lastTouchDist / dist;
                    this.zoom = Utils.clamp(this.zoom * delta, 0.5, 3);
                    this.updateViewBox();
                }
                lastTouchDist = dist;
            }
            e.preventDefault();
        }, { passive: false });
        
        this.svg.addEventListener('touchend', () => {
            isPanning = false;
            lastTouchDist = 0;
        });
    }
    
    /**
     * Update viewBox based on zoom and pan
     */
    updateViewBox() {
        const w = this.viewBox.w / this.zoom;
        const h = this.viewBox.h / this.zoom;
        const x = this.viewBox.x + this.pan.x + (this.viewBox.w - w) / 2;
        const y = this.viewBox.y + this.pan.y + (this.viewBox.h - h) / 2;
        this.svg.setAttribute('viewBox', `${x} ${y} ${w} ${h}`);
    }
    
    /**
     * Zoom in
     */
    zoomIn() {
        this.zoom = Utils.clamp(this.zoom * 1.2, 0.5, 3);
        this.updateViewBox();
    }
    
    /**
     * Zoom out
     */
    zoomOut() {
        this.zoom = Utils.clamp(this.zoom * 0.8, 0.5, 3);
        this.updateViewBox();
    }
    
    /**
     * Reset view
     */
    resetView() {
        this.zoom = 1;
        this.pan = { x: 0, y: 0 };
        this.updateViewBox();
    }
    
    /**
     * Get screen position of a hex (for floating resources)
     */
    getHexScreenPosition(hexIndex) {
        const hex = this.board.hexes[hexIndex];
        if (!hex) return null;
        
        const svgRect = this.svg.getBoundingClientRect();
        const point = this.svg.createSVGPoint();
        point.x = hex.position.x;
        point.y = hex.position.y;
        
        const ctm = this.boardGroup.getScreenCTM();
        if (!ctm) return null;
        
        const screenPoint = point.matrixTransform(ctm);
        return { x: screenPoint.x, y: screenPoint.y };
    }
}

// SECTION 10: PLAYER CLASS
// ============================================================

class Player {
    constructor(index, name, isAI = false, color = null) {
        this.index = index;
        this.name = name;
        this.isAI = isAI;
        this.color = color || CONFIG.PLAYER_COLORS[index];
        
        // Resources
        this.resources = {
            brick: 0,
            lumber: 0,
            wool: 0,
            grain: 0,
            ore: 0
        };
        
        // Pieces remaining
        this.pieces = {
            road: CONFIG.PIECE_LIMITS.road,
            settlement: CONFIG.PIECE_LIMITS.settlement,
            city: CONFIG.PIECE_LIMITS.city
        };
        
        // Built pieces (for tracking)
        this.built = {
            roads: [],
            settlements: [],
            cities: []
        };
        
        // Development cards
        this.devCards = [];
        this.playedKnights = 0;
        
        // Victory points
        this.publicVP = 0;
        this.hiddenVP = 0;
        
        // Achievements
        this.hasLongestRoad = false;
        this.hasLargestArmy = false;
        
        // Stats
        this.totalResourcesGained = 0;
        this.totalTrades = 0;
        this.totalSteals = 0;
        
        // Ports
        this.ports = new Set();
    }
    
    /**
     * Get total VP
     */
    get totalVP() {
        return this.publicVP + this.hiddenVP;
    }
    
    /**
     * Get total resource count
     */
    get totalResources() {
        return Object.values(this.resources).reduce((a, b) => a + b, 0);
    }
    
    /**
     * Check if player can afford a building
     */
    canAfford(type) {
        const cost = CONFIG.COSTS[type];
        return Object.entries(cost).every(([res, amt]) => this.resources[res] >= amt);
    }
    
    /**
     * Check if player has pieces remaining
     */
    hasPiece(type) {
        return this.pieces[type] > 0;
    }
    
    /**
     * Pay for a building
     */
    pay(type) {
        const cost = CONFIG.COSTS[type];
        Object.entries(cost).forEach(([res, amt]) => {
            this.resources[res] -= amt;
        });
    }
    
    /**
     * Add resources
     */
    addResources(resources) {
        Object.entries(resources).forEach(([res, amt]) => {
            if (this.resources.hasOwnProperty(res)) {
                this.resources[res] += amt;
                this.totalResourcesGained += amt;
            }
        });
    }
    
    /**
     * Remove resources
     */
    removeResources(resources) {
        Object.entries(resources).forEach(([res, amt]) => {
            if (this.resources.hasOwnProperty(res)) {
                this.resources[res] = Math.max(0, this.resources[res] - amt);
            }
        });
    }
    
    /**
     * Add a development card
     */
    addDevCard(card) {
        // Preserve turnReceived from the card so it cannot be played the same turn it's purchased
        const turnReceived = (card && card.turnReceived != null) ? card.turnReceived : 0;
        this.devCards.push({ ...card, turnReceived, played: false });
    }
    
    /**
     * Count of specific dev card type
     */
    countDevCards(type, onlyPlayable = false) {
        return this.devCards.filter(c => 
            c.type === type && 
            (!onlyPlayable || !c.played)
        ).length;
    }
    
    /**
     * Play a development card
     */
    playDevCard(type) {
        const card = this.devCards.find(c => c.type === type && !c.played);
        if (card) {
            card.played = true;
            if (type === 'knight') {
                this.playedKnights++;
            }
            return card;
        }
        return null;
    }
    
    /**
     * Can play a dev card this turn
     */
    canPlayDevCard(type, turnNumber) {
        return this.devCards.some(c => 
            c.type === type && 
            !c.played && 
            c.turnReceived < turnNumber
        );
    }
    
    /**
     * Discard half resources (rounded down)
     */
    getDiscardCount() {
        return Math.floor(this.totalResources / 2);
    }
    
    /**
     * Serialize player state
     */
    serialize() {
        return {
            index: this.index,
            name: this.name,
            isAI: this.isAI,
            resources: { ...this.resources },
            pieces: { ...this.pieces },
            built: {
                roads: [...this.built.roads],
                settlements: [...this.built.settlements],
                cities: [...this.built.cities]
            },
            devCards: this.devCards.map(c => ({ ...c })),
            playedKnights: this.playedKnights,
            publicVP: this.publicVP,
            hiddenVP: this.hiddenVP,
            hasLongestRoad: this.hasLongestRoad,
            hasLargestArmy: this.hasLargestArmy,
            ports: Array.from(this.ports),
            totalResourcesGained: this.totalResourcesGained,
            totalTrades: this.totalTrades,
            totalSteals: this.totalSteals
        };
    }
    
    /**
     * Deserialize player state
     */
    static deserialize(data) {
        const player = new Player(data.index, data.name, data.isAI);
        player.resources = { ...data.resources };
        player.pieces = { ...data.pieces };
        player.built = {
            roads: [...data.built.roads],
            settlements: [...data.built.settlements],
            cities: [...data.built.cities]
        };
        player.devCards = data.devCards.map(c => ({ ...c }));
        player.playedKnights = data.playedKnights;
        player.publicVP = data.publicVP;
        player.hiddenVP = data.hiddenVP;
        player.hasLongestRoad = data.hasLongestRoad;
        player.hasLargestArmy = data.hasLargestArmy;
        player.ports = new Set(data.ports);
        player.totalResourcesGained = data.totalResourcesGained;
        player.totalTrades = data.totalTrades;
        player.totalSteals = data.totalSteals;
        return player;
    }
}

// ============================================================
// SECTION 11: AI PLAYER
// ============================================================

class AIPlayer {
    constructor(difficulty = 'normal') {
        this.difficulty = difficulty;
        this.thinkingDelay = CONFIG.AI_DELAYS[difficulty] || 900;
    }
    
    /**
     * Main decision function for AI turn
     */
    async takeTurn(gameState, player) {
        await Utils.wait(this.thinkingDelay);
        
        const actions = [];
        
        // Phase 1: Play development cards (if beneficial)
        const devCardAction = this.considerDevCard(gameState, player);
        if (devCardAction) actions.push(devCardAction);
        
        // Phase 2: Trade (if beneficial)
        const tradeAction = this.considerTrade(gameState, player);
        if (tradeAction) actions.push(tradeAction);
        
        // Phase 3: Build (prioritize by value)
        const buildActions = this.considerBuilding(gameState, player);
        actions.push(...buildActions);
        
        return actions;
    }
    
    /**
     * Choose initial settlement placement
     */
    chooseInitialPlacement(gameState, player, isFirstRound) {
        const validVertices = gameState.getValidSettlementVertices(player.index, true);
        
        if (validVertices.length === 0) return null;
        
        // Score each vertex
        const scored = validVertices.map(vId => ({
            id: vId,
            score: this.scoreVertex(gameState, vId, player, isFirstRound)
        }));
        
        // Sort by score
        scored.sort((a, b) => b.score - a.score);
        
        // Add some randomness based on difficulty
        let choice;
        if (this.difficulty === 'easy') {
            choice = Utils.pick(scored.slice(0, Math.max(3, Math.floor(scored.length / 2))));
        } else if (this.difficulty === 'normal') {
            choice = Utils.pick(scored.slice(0, Math.max(2, Math.floor(scored.length / 3))));
        } else {
            choice = scored[0];
        }
        
        // Choose adjacent edge for road
        const edges = gameState.getEdgesForVertex(choice.id);
        const validEdges = edges.filter(e => gameState.isValidRoadEdge(e.id, player.index, true));
        
        let chosenEdge = null;
        if (validEdges.length > 0) {
            // Pick edge toward best adjacent hex
            if (this.difficulty === 'easy') {
                chosenEdge = Utils.pick(validEdges);
            } else {
                // Score edges based on hex quality
                const edgeScores = validEdges.map(e => ({
                    id: e.id,
                    score: this.scoreEdgeForInitial(gameState, e, choice.id)
                }));
                edgeScores.sort((a, b) => b.score - a.score);
                chosenEdge = edgeScores[0];
            }
        }
        
        return {
            vertexId: choice.id,
            edgeId: chosenEdge ? chosenEdge.id : null
        };
    }
    
    /**
     * Score a vertex for settlement placement
     */
    scoreVertex(gameState, vertexId, player, isFirstRound) {
        const vertex = gameState.board.vertices.find(v => v.id === vertexId);
        if (!vertex) return 0;
        
        let score = 0;
        
        // Resources from adjacent hexes
        vertex.hexes.forEach(hexIdx => {
            const hex = gameState.board.hexes[hexIdx];
            if (hex.token === null) return;
            
            // Base probability (dots)
            const prob = CONFIG.PROBABILITY_DOTS[hex.token] || 0;
            
            // Resource value based on current needs
            const resValue = this.resourceValue(hex.terrain, player);
            score += prob * resValue;
            
            // Penalty for having the robber
            if (hexIdx === gameState.board.robberPosition) {
                score -= 5;
            }
        });
        
        // Bonus for variety of resources
        const resources = new Set(vertex.hexes.map(i => gameState.board.hexes[i].terrain).filter(t => t !== 'desert'));
        score += resources.size * 2;
        
        // Bonus for coastal positions (ports)
        const isCoastal = vertex.hexes.length < 3;
        if (isCoastal) {
            score += 1;
        }
        
        // In first round, prioritize high-probability hexes
        if (isFirstRound) {
            score *= 1.5;
        } else {
            // Second round: also consider road expansion potential
            const adjEdges = gameState.getEdgesForVertex(vertexId);
            const expandableEdges = adjEdges.filter(e => 
                gameState.isValidRoadEdge(e.id, player.index, false)
            );
            score += expandableEdges.length * 0.5;
        }
        
        return score;
    }
    
    /**
     * Value of a resource based on current needs
     */
    resourceValue(terrain, player) {
        const values = {
            brick: 1.2,
            lumber: 1.2,
            wool: 0.8,
            grain: 1.1,
            ore: 1.0,
            desert: 0
        };
        
        // Adjust based on what we have plenty of
        const res = this.terrainToResource(terrain);
        if (res && player.resources[res] >= 4) {
            return values[terrain] * 0.5;
        }
        
        // Prioritize resources we need for next build
        if (player.pieces.settlement > 0) {
            // Need brick + lumber + wool + grain for settlement
            if (['brick', 'lumber', 'wool', 'grain'].includes(res)) {
                return values[terrain] * 1.3;
            }
        }
        
        return values[terrain] || 0;
    }
    
    /**
     * Convert terrain to resource
     */
    terrainToResource(terrain) {
        const map = {
            brick: 'brick',
            lumber: 'lumber',
            wool: 'wool',
            grain: 'grain',
            ore: 'ore'
        };
        return map[terrain];
    }
    
    /**
     * Score edge for initial road placement
     */
    scoreEdgeForInitial(gameState, edge, vertexId) {
        // Prefer edges leading to good hexes
        let score = 0;
        edge.hexes.forEach(hexIdx => {
            const hex = gameState.board.hexes[hexIdx];
            if (hex.token !== null) {
                score += CONFIG.PROBABILITY_DOTS[hex.token] || 0;
            }
        });
        return score;
    }
    
    /**
     * Consider playing a development card
     */
    considerDevCard(gameState, player) {
        // Check knights
        if (player.canPlayDevCard('knight', gameState.turnNumber)) {
            // Play knight if: need largest army, or want to move robber away from us
            const knightsPlayed = player.playedKnights;
            const largestArmyHolder = gameState.players.find(p => p.hasLargestArmy);
            const largestArmyCount = largestArmyHolder ? largestArmyHolder.playedKnights : 0;
            
            const shouldPlay = 
                (knightsPlayed >= 2 && knightsPlayed + 1 >= largestArmyCount) ||
                this.isRobberHarmingUs(gameState, player) ||
                (this.difficulty !== 'easy' && knightsPlayed < 3);
            
            if (shouldPlay) {
                return {
                    type: 'playDevCard',
                    card: 'knight',
                    data: this.planKnightMove(gameState, player)
                };
            }
        }
        
        // Year of Plenty
        if (player.canPlayDevCard('yearOfPlenty', gameState.turnNumber)) {
            const needs = this.identifyResourceNeeds(gameState, player);
            if (needs.length > 0) {
                return {
                    type: 'playDevCard',
                    card: 'yearOfPlenty',
                    data: { resources: needs.slice(0, 2) }
                };
            }
        }
        
        // Road Building
        if (player.canPlayDevCard('roadBuilding', gameState.turnNumber)) {
            if (player.pieces.road >= 2) {
                const roads = this.planRoadBuilding(gameState, player, 2);
                if (roads.length >= 1) {
                    return {
                        type: 'playDevCard',
                        card: 'roadBuilding',
                        data: { roads }
                    };
                }
            }
        }
        
        // Monopoly
        if (player.canPlayDevCard('monopoly', gameState.turnNumber)) {
            const bestResource = this.chooseMonopolyResource(gameState, player);
            if (bestResource) {
                return {
                    type: 'playDevCard',
                    card: 'monopoly',
                    data: { resource: bestResource }
                };
            }
        }
        
        return null;
    }
    
    /**
     * Check if robber is on a hex that produces for us
     */
    isRobberHarmingUs(gameState, player) {
        const robberHex = gameState.board.hexes[gameState.board.robberPosition];
        if (robberHex.token === null) return false;
        
        return player.built.settlements.some(vId => {
            const v = gameState.board.vertices.find(vt => vt.id === vId);
            return v && v.hexes.includes(robberHex.index);
        }) || player.built.cities.some(vId => {
            const v = gameState.board.vertices.find(vt => vt.id === vId);
            return v && v.hexes.includes(robberHex.index);
        });
    }
    
    /**
     * Plan knight card move
     */
    planKnightMove(gameState, player) {
        // Choose hex to block (highest value opponent hex)
        const opponents = gameState.players.filter(p => p.index !== player.index);
        let bestHex = null;
        let bestScore = -1;
        
        gameState.board.hexes.forEach(hex => {
            if (hex.index === gameState.board.robberPosition) return;
            if (hex.token === null) return;
            
            let score = CONFIG.PROBABILITY_DOTS[hex.token] || 0;
            
            // Prefer hexes where opponents have buildings
            opponents.forEach(opp => {
                const hasSettlement = opp.built.settlements.some(vId => {
                    const v = gameState.board.vertices.find(vt => vt.id === vId);
                    return v && v.hexes.includes(hex.index);
                });
                const hasCity = opp.built.cities.some(vId => {
                    const v = gameState.board.vertices.find(vt => vt.id === vId);
                    return v && v.hexes.includes(hex.index);
                });
                if (hasSettlement) score += 3;
                if (hasCity) score += 5;
            });
            
            // Prefer hexes we don't have buildings on
            const ourSettlement = player.built.settlements.some(vId => {
                const v = gameState.board.vertices.find(vt => vt.id === vId);
                return v && v.hexes.includes(hex.index);
            });
            const ourCity = player.built.cities.some(vId => {
                const v = gameState.board.vertices.find(vt => vt.id === vId);
                return v && v.hexes.includes(hex.index);
            });
            if (ourSettlement) score -= 10;
            if (ourCity) score -= 20;
            
            if (score > bestScore) {
                bestScore = score;
                bestHex = hex.index;
            }
        });
        
        // Choose player to steal from
        let stealFrom = null;
        if (bestHex !== null) {
            const candidates = opponents.filter(opp => {
                const buildings = [...opp.built.settlements, ...opp.built.cities];
                return buildings.some(vId => {
                    const v = gameState.board.vertices.find(vt => vt.id === vId);
                    return v && v.hexes.includes(bestHex);
                }) && opp.totalResources > 0;
            });
            if (candidates.length > 0) {
                stealFrom = candidates.reduce((best, c) => 
                    c.totalResources > best.totalResources ? c : best
                ).index;
            }
        }
        
        return { hexIndex: bestHex, stealFrom };
    }
    
    /**
     * Identify resource needs for builds
     */
    identifyResourceNeeds(gameState, player) {
        const needs = [];
        
        // Priority: city > settlement > road
        if (player.pieces.city > 0 && player.built.settlements.length > 0) {
            const cityCost = CONFIG.COSTS.city;
            Object.entries(cityCost).forEach(([res, amt]) => {
                const have = player.resources[res];
                const need = Math.max(0, amt - have);
                for (let i = 0; i < need; i++) needs.push(res);
            });
        }
        
        if (needs.length === 0 && player.pieces.settlement > 0) {
            const settCost = CONFIG.COSTS.settlement;
            Object.entries(settCost).forEach(([res, amt]) => {
                const have = player.resources[res];
                const need = Math.max(0, amt - have);
                for (let i = 0; i < need; i++) needs.push(res);
            });
        }
        
        return needs;
    }
    
    /**
     * Plan road building
     */
    planRoadBuilding(gameState, player, count) {
        const roads = [];
        let frontier = this.getBuildableEdges(gameState, player);
        
        for (let i = 0; i < count && frontier.length > 0; i++) {
            // Score each edge
            const scored = frontier.map(e => ({
                id: e.id,
                score: this.scoreEdge(gameState, e, player)
            }));
            scored.sort((a, b) => b.score - a.score);
            
            const best = scored[0];
            roads.push(best.id);
            
            // Remove this edge and update frontier
            frontier = frontier.filter(e => e.id !== best.id);
            
            // Simulate placement to update valid edges for next road
            const tempRoads = [...player.built.roads, best.id];
            frontier = gameState.board.edges.filter(e => {
                if (tempRoads.includes(e.id)) return false;
                if (gameState.isEdgeOccupied(e.id)) return false;
                // Must connect to our network
                return gameState.edgeConnectsToPlayerNetwork(e.id, player.index, tempRoads);
            });
        }
        
        return roads;
    }
    
    /**
     * Score an edge for road building
     */
    scoreEdge(gameState, edge, player) {
        let score = 0;
        
        // Value based on adjacent hexes
        edge.hexes.forEach(hexIdx => {
            const hex = gameState.board.hexes[hexIdx];
            if (hex.token !== null) {
                score += CONFIG.PROBABILITY_DOTS[hex.token] || 0;
            }
        });
        
        // Bonus for leading to empty vertex that could be settlement
        const v1Occupied = gameState.isVertexOccupied(edge.v1);
        const v2Occupied = gameState.isVertexOccupied(edge.v2);
        if (!v1Occupied || !v2Occupied) {
            score += 2;
        }
        
        // Penalty if hex has robber
        if (edge.hexes.includes(gameState.board.robberPosition)) {
            score -= 3;
        }
        
        return score;
    }
    
    /**
     * Get all edges player could build road on
     */
    getBuildableEdges(gameState, player) {
        return gameState.board.edges.filter(e => 
            gameState.isValidRoadEdge(e.id, player.index, false)
        );
    }
    
    /**
     * Choose monopoly resource
     */
    chooseMonopolyResource(gameState, player) {
        const totals = { brick: 0, lumber: 0, wool: 0, grain: 0, ore: 0 };
        
        gameState.players.forEach(p => {
            if (p.index === player.index) return;
            Object.entries(p.resources).forEach(([res, amt]) => {
                totals[res] += amt;
            });
        });
        
        // Pick resource with most in opponents' hands
        let best = null;
        let bestCount = 0;
        Object.entries(totals).forEach(([res, count]) => {
            if (count > bestCount) {
                bestCount = count;
                best = res;
            }
        });
        
        return bestCount >= 3 ? best : null;
    }
    
    /**
     * Consider trading
     */
    considerTrade(gameState, player) {
        // Bank trade: exchange surplus for what we need
        if (this.difficulty === 'easy') return null; // Easy AI doesn't trade
        
        // Find resources we have plenty of (4+)
        const surplus = Object.entries(player.resources)
            .filter(([_, amt]) => amt >= 4)
            .map(([res, _]) => res);
        
        if (surplus.length === 0) return null;
        
        // Find resources we need
        const needs = this.identifyResourceNeeds(gameState, player);
        if (needs.length === 0) return null;
        
        const give = surplus[0];
        const get = needs[0];
        const giveAmount = this.getTradeRate(gameState, player, give);
        
        if (player.resources[give] >= giveAmount) {
            return {
                type: 'bankTrade',
                give: { [give]: giveAmount },
                get: { [get]: 1 }
            };
        }
        
        return null;
    }
    
    /**
     * Get trade rate for a resource (accounting for ports)
     */
    getTradeRate(gameState, player, resource) {
        if (player.ports && player.ports.has(resource)) return 2;
        if (player.ports && player.ports.has('generic')) return 3;
        return 4;
    }
    
    /**
     * Consider building actions
     */
    considerBuilding(gameState, player) {
        const actions = [];
        
        // Priority: city > dev card > settlement > road
        
        // Cities
        if (player.canAfford('city') && player.hasPiece('city') && player.built.settlements.length > 0) {
            const bestSettlement = this.chooseCityUpgrade(gameState, player);
            if (bestSettlement) {
                actions.push({ type: 'build', building: 'city', vertexId: bestSettlement });
            }
        }
        
        // Dev cards
        if (player.canAfford('devCard') && !gameState.hasBuiltThisTurn) {
            // Buy dev card strategically (need knights or VP)
            const shouldBuy = 
                player.playedKnights < 3 ||
                this.difficulty === 'expert' ||
                (this.difficulty !== 'easy' && Math.random() > 0.3);
            
            if (shouldBuy) {
                actions.push({ type: 'buyDevCard' });
            }
        }
        
        // Settlements
        if (player.canAfford('settlement') && player.hasPiece('settlement') && player.built.roads.length > 0) {
            const bestVertex = this.chooseSettlementPlacement(gameState, player);
            if (bestVertex) {
                actions.push({ type: 'build', building: 'settlement', vertexId: bestVertex });
            }
        }
        
        // Roads
        if (player.canAfford('road') && player.hasPiece('road')) {
            const frontier = this.getBuildableEdges(gameState, player);
            if (frontier.length > 0) {
                const scored = frontier.map(e => ({
                    id: e.id,
                    score: this.scoreEdge(gameState, e, player)
                }));
                scored.sort((a, b) => b.score - a.score);
                
                // Build a road if it leads somewhere valuable
                if (scored[0].score >= 3 || this.difficulty === 'expert') {
                    actions.push({ type: 'build', building: 'road', edgeId: scored[0].id });
                }
            }
        }
        
        return actions;
    }
    
    /**
     * Choose which settlement to upgrade to city
     */
    chooseCityUpgrade(gameState, player) {
        const scored = player.built.settlements.map(vId => {
            const vertex = gameState.board.vertices.find(v => v.id === vId);
            let score = 0;
            vertex.hexes.forEach(hexIdx => {
                const hex = gameState.board.hexes[hexIdx];
                if (hex.token !== null) {
                    score += CONFIG.PROBABILITY_DOTS[hex.token] || 0;
                }
            });
            return { id: vId, score };
        });
        
        scored.sort((a, b) => b.score - a.score);
        return scored[0] ? scored[0].id : null;
    }
    
    /**
     * Choose settlement placement
     */
    chooseSettlementPlacement(gameState, player) {
        const validVertices = gameState.getValidSettlementVertices(player.index, false);
        if (validVertices.length === 0) return null;
        
        const scored = validVertices.map(vId => ({
            id: vId,
            score: this.scoreVertex(gameState, vId, player, false)
        }));
        
        scored.sort((a, b) => b.score - a.score);
        
        // Pick based on difficulty
        let choice;
        if (this.difficulty === 'easy') {
            choice = Utils.pick(scored.slice(0, Math.max(3, Math.floor(scored.length / 2))));
        } else if (this.difficulty === 'normal') {
            choice = Utils.pick(scored.slice(0, Math.max(2, Math.floor(scored.length / 3))));
        } else {
            choice = scored[0];
        }
        
        return choice ? choice.id : null;
    }
    
    /**
     * Choose robber placement (when 7 is rolled or knight played)
     */
    chooseRobberPlacement(gameState, player) {
        return this.planKnightMove(gameState, player).hexIndex;
    }
    
    /**
     * Choose player to steal from
     */
    chooseStealTarget(gameState, player, validTargets) {
        if (validTargets.length === 0) return null;
        
        // Pick player with most resources, or highest VP
        const candidates = validTargets.map(idx => gameState.players[idx]);
        candidates.sort((a, b) => {
            if (b.totalResources !== a.totalResources) {
                return b.totalResources - a.totalResources;
            }
            return b.totalVP - a.totalVP;
        });
        
        return candidates[0].index;
    }
    
    /**
     * Choose resources to discard
     */
    chooseDiscard(player, count) {
        const toDiscard = {};
        let remaining = count;
        
        // Discard most abundant resources first
        const sorted = Object.entries(player.resources)
            .filter(([_, amt]) => amt > 0)
            .sort((a, b) => b[1] - a[1]);
        
        for (const [res, amt] of sorted) {
            if (remaining <= 0) break;
            const discard = Math.min(amt, remaining);
            toDiscard[res] = discard;
            remaining -= discard;
        }
        
        return toDiscard;
    }
}

// ============================================================
// SECTION 12: GAME STATE
// ============================================================

class GameState {
    constructor(config) {
        this.config = config;
        this.board = null;
        this.players = [];
        this.currentPlayerIndex = 0;
        this.phase = GAME_PHASE.SETUP;
        this.turnNumber = 0;
        this.setupRound = 1;
        this.setupDirection = 1; // 1 forward, -1 reverse
        
        this.devCardDeck = [];
        this.discardedDevCards = [];
        
        this.lastRoll = null;
        this.lastRolledSeven = false;
        this.hasRolledThisTurn = false;
        this.hasBuiltThisTurn = false;
        this.hasPlayedDevCardThisTurn = false;
        
        this.longestRoadHolder = null;
        this.longestRoadLength = 0;
        this.largestArmyHolder = null;
        this.largestArmySize = 0;
        
        this.pendingActions = [];
        this.winner = null;
        this.lastPlacedSettlement = null; // Track for setup road placement
        
        this.vpTarget = config.vpTarget || CONFIG.DEFAULT_VP_TARGET;
        this.gameStartTime = Date.now();
    }
    
    /**
     * Initialize board
     */
    initBoard(boardData) {
        this.board = boardData;
        this.resetDevCardDeck();
        // Standard Catan bank: 19 of each resource
        this.bank = { brick: 19, lumber: 19, wool: 19, grain: 19, ore: 19 };
    }
    
    /**
     * Reset dev card deck
     */
    resetDevCardDeck() {
        const deck = CONFIG.DEV_CARD_DECK.map((type, i) => ({
            id: `dev_${i}`,
            type,
            name: type === 'victoryPoint' 
                ? CONFIG.VP_CARD_NAMES[i % CONFIG.VP_CARD_NAMES.length]
                : type
        }));
        this.devCardDeck = Utils.shuffle(deck);
    }
    
    /**
     * Add a player
     */
    addPlayer(player) {
        this.players.push(player);
    }
    
    /**
     * Get current player
     */
    get currentPlayer() {
        return this.players[this.currentPlayerIndex];
    }
    
    /**
     * Check if vertex is occupied by any building
     */
    isVertexOccupied(vertexId) {
        return this.players.some(p => 
            p.built.settlements.includes(vertexId) || 
            p.built.cities.includes(vertexId)
        );
    }
    
    /**
     * Get owner of vertex
     */
    getVertexOwner(vertexId) {
        for (const p of this.players) {
            if (p.built.settlements.includes(vertexId) || p.built.cities.includes(vertexId)) {
                return p.index;
            }
        }
        return null;
    }
    
    /**
     * Check if edge is occupied by any road
     */
    isEdgeOccupied(edgeId) {
        return this.players.some(p => p.built.roads.includes(edgeId));
    }
    
    /**
     * Check if edge is valid for road placement
     */
    isValidRoadEdge(edgeId, playerIndex, isSetup = false) {
        if (this.isEdgeOccupied(edgeId)) return false;
        
        const edge = this.board.edges.find(e => e.id === edgeId);
        if (!edge) return false;
        
        const player = this.players[playerIndex];
        
        // Check piece availability
        if (!isSetup && player.pieces.road <= 0) return false;
        
        // During setup, road must connect only to the LAST placed settlement
        if (isSetup) {
            const lastSettlement = this.lastPlacedSettlement;
            if (lastSettlement) {
                return edge.v1 === lastSettlement || edge.v2 === lastSettlement;
            }
            // Fallback: any settlement
            return player.built.settlements.includes(edge.v1) || 
                   player.built.settlements.includes(edge.v2);
        }
        
        // Must connect to our network and have at least one open endpoint
        const v1Free = !this.isVertexOccupied(edge.v1) || this.getVertexOwner(edge.v1) === playerIndex;
        const v2Free = !this.isVertexOccupied(edge.v2) || this.getVertexOwner(edge.v2) === playerIndex;
        
        // At least one endpoint must be free OR owned by us
        if (!v1Free && !v2Free) return false;
        
        // Edge must connect to our network
        return this.edgeConnectsToPlayerNetwork(edgeId, playerIndex, player.built.roads);
    }
    
    /**
     * Check if edge connects to player's network
     */
    edgeConnectsToPlayerNetwork(edgeId, playerIndex, roadsList = null) {
        const player = this.players[playerIndex];
        const roads = roadsList || player.built.roads;
        
        // Check if edge connects to any of our buildings or roads
        const edge = this.board.edges.find(e => e.id === edgeId);
        if (!edge) return false;
        
        // Check buildings
        if (player.built.settlements.includes(edge.v1) || 
            player.built.settlements.includes(edge.v2) ||
            player.built.cities.includes(edge.v1) || 
            player.built.cities.includes(edge.v2)) {
            return true;
        }
        
        // Check roads - must connect to an endpoint of an existing road
        return roads.some(rId => {
            const r = this.board.edges.find(e => e.id === rId);
            return r && (r.v1 === edge.v1 || r.v1 === edge.v2 || 
                         r.v2 === edge.v1 || r.v2 === edge.v2);
        });
    }
    
    /**
     * Get valid vertices for settlement placement
     */
    getValidSettlementVertices(playerIndex, isSetup = false) {
        const player = this.players[playerIndex];
        const valid = [];
        
        this.board.vertices.forEach(vertex => {
            // Already occupied?
            if (this.isVertexOccupied(vertex.id)) return;
            
            // Distance rule: no adjacent vertices can be occupied
            const adjacent = this.getAdjacentVertexIds(vertex.id);
            if (adjacent.some(aId => this.isVertexOccupied(aId))) return;
            
            if (isSetup) {
                valid.push(vertex.id);
                return;
            }
            
            // Must connect to our road network
            const edges = this.getEdgesForVertex(vertex.id);
            const connectsToOurRoad = edges.some(e => 
                player.built.roads.includes(e.id)
            );
            if (!connectsToOurRoad) return;
            
            valid.push(vertex.id);
        });
        
        return valid;
    }
    
    /**
     * Get adjacent vertex IDs
     */
    getAdjacentVertexIds(vertexId) {
        return this.board.edges
            .filter(e => e.v1 === vertexId || e.v2 === vertexId)
            .map(e => e.v1 === vertexId ? e.v2 : e.v1);
    }
    
    /**
     * Get edges for a vertex
     */
    getEdgesForVertex(vertexId) {
        return this.board.edges.filter(e => e.v1 === vertexId || e.v2 === vertexId);
    }
    
    /**
     * Build a road
     */
    buildRoad(playerIndex, edgeId) {
        const player = this.players[playerIndex];
        const edge = this.board.edges.find(e => e.id === edgeId);
        if (!edge) return false;
        
        player.built.roads.push(edgeId);
        player.pieces.road--;
        
        // Update longest road
        this.updateLongestRoad();
        
        return true;
    }
    
    /**
     * Build a settlement
     */
    buildSettlement(playerIndex, vertexId) {
        const player = this.players[playerIndex];
        const vertex = this.board.vertices.find(v => v.id === vertexId);
        if (!vertex) return false;
        
        player.built.settlements.push(vertexId);
        player.pieces.settlement--;
        player.publicVP++;
        
        // Track last placed settlement for setup road placement rules
        this.lastPlacedSettlement = vertexId;
        
        // Check for ports
        this.checkPortAccess(player, vertex);
        
        return true;
    }
    
    /**
     * Upgrade settlement to city
     */
    upgradeToCity(playerIndex, vertexId) {
        const player = this.players[playerIndex];
        const idx = player.built.settlements.indexOf(vertexId);
        if (idx === -1) return false;
        
        player.built.settlements.splice(idx, 1);
        player.built.cities.push(vertexId);
        player.pieces.settlement++; // Return settlement piece
        player.pieces.city--;
        player.publicVP++; // City is 2 VP, settlement was 1 VP
        
        // Ensure port access is preserved (in case it wasn't set during settlement)
        const vertex = this.board.vertices.find(v => v.id === vertexId);
        if (vertex) this.checkPortAccess(player, vertex);
        
        return true;
    }
    
    /**
     * Check if player gets port access from vertex
     */
    checkPortAccess(player, vertex) {
        if (!this.board.ports) return;
        
        const port = this.board.ports.find(p => p.vertices.includes(vertex.id));
        if (port) {
            player.ports.add(port.type);
        }
    }
    
    /**
     * Update longest road holder
     */
    updateLongestRoad() {
        let maxLen = this.longestRoadLength;
        let holder = this.longestRoadHolder;
        let newHolder = null;
        let newMaxLen = 0;
        
        this.players.forEach(player => {
            const len = this.calculateLongestRoad(player.index);
            if (len > newMaxLen) {
                newMaxLen = len;
                newHolder = player.index;
            }
        });
        
        // Longest road needs at least 5
        if (newMaxLen < 5) {
            // No one has longest road
            if (this.longestRoadHolder !== null) {
                const oldHolder = this.players[this.longestRoadHolder];
                oldHolder.hasLongestRoad = false;
                oldHolder.publicVP -= 2;
            }
            this.longestRoadHolder = null;
            this.longestRoadLength = 0;
            return;
        }
        
        // New holder takes it
        if (newMaxLen > this.longestRoadLength || 
            (newMaxLen === this.longestRoadLength && this.longestRoadHolder === null)) {
            if (this.longestRoadHolder !== null && this.longestRoadHolder !== newHolder) {
                const oldHolder = this.players[this.longestRoadHolder];
                oldHolder.hasLongestRoad = false;
                oldHolder.publicVP -= 2;
            }
            if (newHolder !== this.longestRoadHolder) {
                const p = this.players[newHolder];
                p.hasLongestRoad = true;
                p.publicVP += 2;
            }
            this.longestRoadHolder = newHolder;
            this.longestRoadLength = newMaxLen;
        }
    }
    
    /**
     * Calculate longest road for a player using DFS
     */
    calculateLongestRoad(playerIndex) {
        const player = this.players[playerIndex];
        if (player.built.roads.length === 0) return 0;
        
        // Build adjacency list of our roads
        const adj = new Map();
        player.built.roads.forEach(rId => {
            const edge = this.board.edges.find(e => e.id === rId);
            if (!edge) return;
            
            if (!adj.has(edge.v1)) adj.set(edge.v1, []);
            if (!adj.has(edge.v2)) adj.set(edge.v2, []);
            adj.get(edge.v1).push({ to: edge.v2, road: rId });
            adj.get(edge.v2).push({ to: edge.v1, road: rId });
        });
        
        let maxLen = 0;
        const visitedRoads = new Set();
        
        // DFS from each vertex
        const dfs = (current, length) => {
            maxLen = Math.max(maxLen, length);
            
            const neighbors = adj.get(current) || [];
            for (const { to, road } of neighbors) {
                if (visitedRoads.has(road)) continue;
                
                // Check if vertex is occupied by opponent (blocks road)
                const owner = this.getVertexOwner(to);
                if (owner !== null && owner !== playerIndex) continue;
                
                visitedRoads.add(road);
                dfs(to, length + 1);
                visitedRoads.delete(road);
            }
        };
        
        // Start DFS from every vertex in our network
        for (const vertexId of adj.keys()) {
            dfs(vertexId, 0);
        }
        
        return maxLen;
    }
    
    /**
     * Update largest army
     */
    updateLargestArmy() {
        let maxSize = this.largestArmySize;
        let holder = this.largestArmyHolder;
        let newHolder = null;
        let newMaxSize = 0;
        
        this.players.forEach(player => {
            if (player.playedKnights > newMaxSize) {
                newMaxSize = player.playedKnights;
                newHolder = player.index;
            }
        });
        
        // Needs at least 3 knights
        if (newMaxSize < 3) {
            if (this.largestArmyHolder !== null) {
                const oldHolder = this.players[this.largestArmyHolder];
                oldHolder.hasLargestArmy = false;
                oldHolder.publicVP -= 2;
            }
            this.largestArmyHolder = null;
            this.largestArmySize = 0;
            return;
        }
        
        // New holder takes it
        if (newMaxSize > this.largestArmySize ||
            (newMaxSize === this.largestArmySize && this.largestArmyHolder === null)) {
            if (this.largestArmyHolder !== null && this.largestArmyHolder !== newHolder) {
                const oldHolder = this.players[this.largestArmyHolder];
                oldHolder.hasLargestArmy = false;
                oldHolder.publicVP -= 2;
            }
            if (newHolder !== this.largestArmyHolder) {
                const p = this.players[newHolder];
                p.hasLargestArmy = true;
                p.publicVP += 2;
            }
            this.largestArmyHolder = newHolder;
            this.largestArmySize = newMaxSize;
        }
    }
    
    /**
     * Distribute resources after dice roll (respects bank limits)
     */
    distributeResources(roll) {
        const produced = [];
        
        // First pass: calculate what would be produced
        const demands = {}; // res -> [{playerIndex, count, hexIndex}]
        
        this.board.hexes.forEach(hex => {
            if (hex.token !== roll) return;
            if (hex.index === this.board.robberPosition) return;
            
            const res = this.terrainToResource(hex.terrain);
            if (!res) return;
            
            this.board.vertices.forEach(vertex => {
                if (!vertex.hexes.includes(hex.index)) return;
                
                this.players.forEach(player => {
                    let count = 0;
                    if (player.built.settlements.includes(vertex.id)) count = 1;
                    else if (player.built.cities.includes(vertex.id)) count = 2;
                    
                    if (count > 0) {
                        if (!demands[res]) demands[res] = [];
                        demands[res].push({ playerIndex: player.index, count, hexIndex: hex.index });
                    }
                });
            });
        });
        
        // Second pass: distribute respecting bank limits
        Object.entries(demands).forEach(([res, demandList]) => {
            const totalDemand = demandList.reduce((sum, d) => sum + d.count, 0);
            const bankHas = this.bank ? (this.bank[res] || 0) : 19;
            
            if (bankHas === 0) return; // Bank has none
            
            // If bank can't cover all demands, nobody gets this resource (standard rule)
            if (totalDemand > bankHas) return;
            
            demandList.forEach(d => {
                const player = this.players[d.playerIndex];
                player.addResources({ [res]: d.count });
                if (this.bank) this.bank[res] -= d.count;
                produced.push({ ...d, resource: res });
            });
        });
        
        return produced;
    }
    
    /**
     * Convert terrain to resource
     */
    terrainToResource(terrain) {
        return {
            brick: 'brick',
            lumber: 'lumber',
            wool: 'wool',
            grain: 'grain',
            ore: 'ore',
            desert: null
        }[terrain];
    }
    
    /**
     * Get valid targets for stealing (on a specific hex)
     */
    getStealTargets(hexIndex, playerIndex) {
        const targets = [];
        const hex = this.board.hexes[hexIndex];
        
        this.players.forEach(p => {
            if (p.index === playerIndex) return;
            if (p.totalResources === 0) return;
            
            const buildings = [...p.built.settlements, ...p.built.cities];
            const hasBuildingOnHex = buildings.some(vId => {
                const v = this.board.vertices.find(vt => vt.id === vId);
                return v && v.hexes.includes(hexIndex);
            });
            
            if (hasBuildingOnHex) {
                targets.push(p.index);
            }
        });
        
        return targets;
    }
    
    /**
     * Execute steal from target
     */
    stealFrom(thiefIndex, targetIndex) {
        const thief = this.players[thiefIndex];
        const target = this.players[targetIndex];
        
        if (target.totalResources === 0) return null;
        
        // Pick random resource
        const available = Object.entries(target.resources).filter(([_, amt]) => amt > 0);
        if (available.length === 0) return null;
        
        const [res, _] = Utils.pick(available);
        target.resources[res]--;
        thief.resources[res]++;
        thief.totalSteals++;
        
        return res;
    }
    
    /**
     * Execute monopoly
     */
    executeMonopoly(playerIndex, resource) {
        const player = this.players[playerIndex];
        let total = 0;
        
        this.players.forEach(p => {
            if (p.index === playerIndex) return;
            const amount = p.resources[resource];
            if (amount > 0) {
                p.resources[resource] = 0;
                player.resources[resource] += amount;
                total += amount;
            }
        });
        
        return total;
    }
    
    /**
     * Execute Year of Plenty (take from bank)
     */
    executeYearOfPlenty(playerIndex, resources) {
        const player = this.players[playerIndex];
        resources.forEach(res => {
            if (this.bank && this.bank[res] > 0) {
                player.resources[res]++;
                this.bank[res]--;
            } else if (!this.bank) {
                player.resources[res]++;
            }
        });
    }
    
    /**
     * Draw development card
     */
    drawDevCard() {
        if (this.devCardDeck.length === 0) {
            // Reshuffle discarded
            if (this.discardedDevCards.length > 0) {
                this.devCardDeck = Utils.shuffle(this.discardedDevCards);
                this.discardedDevCards = [];
            } else {
                return null;
            }
        }
        return this.devCardDeck.pop();
    }
    
    /**
     * Advance to next player
     */
    nextPlayer() {
        if (this.phase === GAME_PHASE.SETUP) {
            // Setup phase: special ordering
            this.currentPlayerIndex += this.setupDirection;
            
            if (this.currentPlayerIndex >= this.players.length) {
                // Reached end, reverse direction
                this.setupDirection = -1;
                this.currentPlayerIndex = this.players.length - 1;
                this.setupRound = 2;
            } else if (this.currentPlayerIndex < 0) {
                // Setup complete
                this.phase = GAME_PHASE.ROLL;
                this.currentPlayerIndex = 0;
                this.turnNumber = 1;
                return true;
            }
        } else {
            // Normal turn order
            this.currentPlayerIndex = (this.currentPlayerIndex + 1) % this.players.length;
            if (this.currentPlayerIndex === 0) {
                this.turnNumber++;
            }
        }
        
        this.hasRolledThisTurn = false;
        this.hasBuiltThisTurn = false;
        this.hasPlayedDevCardThisTurn = false;
        
        return false;
    }
    
    /**
     * Check win condition
     */
    checkWin() {
        for (const player of this.players) {
            if (player.totalVP >= this.vpTarget) {
                this.winner = player.index;
                this.phase = GAME_PHASE.GAME_OVER;
                return player.index;
            }
        }
        return null;
    }
    
    /**
     * Serialize game state
     */
    serialize() {
        return {
            config: this.config,
            board: this.board,
            players: this.players.map(p => p.serialize()),
            currentPlayerIndex: this.currentPlayerIndex,
            phase: this.phase,
            turnNumber: this.turnNumber,
            setupRound: this.setupRound,
            setupDirection: this.setupDirection,
            devCardDeck: this.devCardDeck,
            discardedDevCards: this.discardedDevCards,
            lastRoll: this.lastRoll,
            longestRoadHolder: this.longestRoadHolder,
            longestRoadLength: this.longestRoadLength,
            largestArmyHolder: this.largestArmyHolder,
            largestArmySize: this.largestArmySize,
            vpTarget: this.vpTarget,
            gameStartTime: this.gameStartTime,
            bank: this.bank,
            lastPlacedSettlement: this.lastPlacedSettlement
        };
    }
    
    /**
     * Deserialize game state
     */
    static deserialize(data) {
        const game = new GameState(data.config);
        game.board = data.board;
        game.players = data.players.map(p => Player.deserialize(p));
        game.currentPlayerIndex = data.currentPlayerIndex;
        game.phase = data.phase;
        game.turnNumber = data.turnNumber;
        game.setupRound = data.setupRound;
        game.setupDirection = data.setupDirection;
        game.devCardDeck = data.devCardDeck;
        game.discardedDevCards = data.discardedDevCards;
        game.lastRoll = data.lastRoll;
        game.longestRoadHolder = data.longestRoadHolder;
        game.longestRoadLength = data.longestRoadLength;
        game.largestArmyHolder = data.largestArmyHolder;
        game.largestArmySize = data.largestArmySize;
        game.vpTarget = data.vpTarget;
        game.gameStartTime = data.gameStartTime;
        game.bank = data.bank || { brick: 19, lumber: 19, wool: 19, grain: 19, ore: 19 };
        game.lastPlacedSettlement = data.lastPlacedSettlement || null;
        return game;
    }
}

// SECTION 13: TOAST SYSTEM
// ============================================================

class ToastSystem {
    constructor(container) {
        this.container = container;
        this.maxToasts = 5;
    }
    
    show(message, type = 'info', duration = 3000, icon = null) {
        const icons = {
            info: 'ℹ',
            success: '✓',
            error: '✕',
            warning: '⚠'
        };
        
        // Remove oldest if too many
        while (this.container.children.length >= this.maxToasts) {
            const oldest = this.container.firstChild;
            if (oldest) oldest.remove();
        }
        
        const toast = Utils.createElement('div', {
            class: `toast ${type}`
        }, [
            Utils.createElement('span', { class: 'toast-icon', text: icon || icons[type] }),
            Utils.createElement('span', { text: message })
        ]);
        
        this.container.appendChild(toast);
        
        setTimeout(() => {
            toast.classList.add('removing');
            setTimeout(() => toast.remove(), 300);
        }, duration);
    }
}

// ============================================================
// SECTION 14: MODAL MANAGER
// ============================================================

class ModalManager {
    constructor(audio) {
        this.overlay = document.getElementById('modalOverlay');
        this.modal = document.getElementById('modal');
        this.titleEl = document.getElementById('modalTitle');
        this.bodyEl = document.getElementById('modalBody');
        this.footerEl = document.getElementById('modalFooter');
        this.audio = audio;
        this.onClose = null;
        
        this.overlay.addEventListener('click', (e) => {
            if (e.target === this.overlay) this.close();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && this.isOpen()) this.close();
        });
    }
    
    isOpen() {
        return this.overlay.classList.contains('active');
    }
    
    open(title, bodyContent, footerButtons = [], onClose = null) {
        this.titleEl.textContent = title;
        this.bodyEl.innerHTML = '';
        this.footerEl.innerHTML = '';
        
        if (typeof bodyContent === 'string') {
            this.bodyEl.innerHTML = bodyContent;
        } else {
            this.bodyEl.appendChild(bodyContent);
        }
        
        footerButtons.forEach(btn => {
            const button = Utils.createElement('button', {
                class: `footer-btn ${btn.class || ''}`,
                text: btn.text,
                onclick: () => {
                    if (btn.onClick) {
                        const result = btn.onClick();
                        if (result !== false) this.close();
                    } else {
                        this.close();
                    }
                }
            });
            if (btn.disabled) button.disabled = true;
            this.footerEl.appendChild(button);
        });
        
        this.onClose = onClose;
        this.overlay.classList.add('active');
        this.audio.modalOpen();
    }
    
    close() {
        this.overlay.classList.remove('active');
        if (this.onClose) this.onClose();
        this.audio.modalClose();
    }
    
    confirm(title, message, onConfirm, onCancel = null) {
        this.open(
            title,
            Utils.createElement('p', {
                style: { fontFamily: 'var(--font-body)', fontSize: '1rem', color: 'var(--color-text-dim)' },
                text: message
            }),
            [
                { text: 'Cancel', onClick: () => { if (onCancel) onCancel(); } },
                { text: 'Confirm', class: 'primary', onClick: onConfirm }
            ]
        );
    }
}

class SettingsUI {

    show() {

        content.appendChild(gameplayGroup);
        
        // Danger zone

        });
